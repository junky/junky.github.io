                                    :notes="[{&quot;id&quot;:&quot;2026-03-24-mwkhz&quot;,&quot;title&quot;:&quot;Customer Area&quot;,&quot;release_date&quot;:&quot;2026-03-19&quot;,&quot;date&quot;:1773874800000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;&quot;,&quot;rss_url&quot;:&quot;?customer_area=customer_area&amp;utm_source=rss_feed#releaseNote=2026-03-19-customer-area&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/browser-customer-area-ca.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;customer_area&quot;,&quot;type&quot;:&quot;customer_area&quot;,&quot;value&quot;:&quot;customer_area&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;You can now view payout information directly from an account holder&#039;s profile or search results. This removes the need to manually filter data and helps you identify and resolve payout issues faster.&lt;\/p&gt;\n&lt;p&gt;We added a &lt;strong&gt;Payouts&lt;\/strong&gt; tab to the account holder details page and a &lt;strong&gt;View payouts&lt;\/strong&gt; shortcut in the account holder search results. These show a list of bank transfers from the last three months, including status, amount, estimated arrival time (ETA), and counterparty bank account.&lt;\/p&gt;\n&lt;p&gt;In the Customer Area:&lt;\/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Select &lt;strong&gt;View payouts&lt;\/strong&gt; from the account holder search results.&lt;\/li&gt;\n&lt;li&gt;Go to &lt;strong&gt;Account holder details&lt;\/strong&gt; &amp;gt; &lt;strong&gt;Payouts&lt;\/strong&gt;.&lt;\/li&gt;\n&lt;\/ul&gt;&quot;}],&quot;customer_area&quot;:&quot;customer_area&quot;,&quot;category&quot;:&quot;customer_area&quot;},{&quot;id&quot;:&quot;2026-03-11-jt9nw&quot;,&quot;title&quot;:&quot;Webhooks&quot;,&quot;release_date&quot;:&quot;2026-03-10&quot;,&quot;date&quot;:1773097200000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=webhooks&amp;utm_source=rss_feed#releaseNote=2026-03-10-webhooks&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/paper-plane.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;webhooks&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;&lt;strong&gt;Capital&lt;\/strong&gt;&lt;\/p&gt;\n&lt;p&gt;&lt;strong&gt;Dynamic offer created&lt;\/strong&gt; webhook added.&lt;\/p&gt;\n&lt;p&gt;If you want Adyen to inform your system when a new dynamic offer is created for an account holder, you can configure a &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/capital-webhooks\/1\/post\/balancePlatform.capital.dynamicOffer.created\&quot; class=\&quot;codeLabel\&quot;&gt;&lt;code&gt;Dynamic offer created&lt;\/code&gt;&lt;\/a&gt; webhook. &lt;\/p&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;webhooks&quot;,&quot;category&quot;:&quot;webhooks&quot;},{&quot;id&quot;:&quot;2026-03-11-hrot0&quot;,&quot;title&quot;:&quot;Capital API&quot;,&quot;release_date&quot;:&quot;2026-03-10&quot;,&quot;date&quot;:1773097200000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;1&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=capital_api&amp;version=1&amp;utm_source=rss_feed#releaseNote=2026-03-10-capital-api-1&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/code.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;capital_api&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;You can now use our new API endpoints to provide &lt;a href=\&quot;https:\/\/docs.adyen.com\/capital\/get-grant-offers\/dynamic-offers\&quot;&gt;dynamic offers&lt;\/a&gt; to eligible users:&lt;\/p&gt;\n&lt;ul&gt;\n&lt;li&gt;GET &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/capital\/1\/get\/dynamicOffers\&quot; class=\&quot;codeLabel\&quot;&gt;&lt;code&gt;\/dynamicOffers&lt;\/code&gt;&lt;\/a&gt; returns the range of available financing for an account holder.&lt;\/li&gt;\n&lt;li&gt;POST &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/capital\/1\/post\/dynamicOffers\/(id\&quot; class=\&quot;codeLabel)\/calculate\&quot;&gt;&lt;code&gt;\/dynamicOffers\/{dynamicOfferId}\/calculate&lt;\/code&gt;&lt;\/a&gt; generates a preliminary offer based on the amount selected by the user.&lt;\/li&gt;\n&lt;li&gt;POST &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/capital\/1\/post\/dynamicOffers\/(id\&quot; class=\&quot;codeLabel)\/grantOffer\&quot;&gt;&lt;code&gt;\/dynamicOffers\/{dynamicOfferId}\/grantOffer&lt;\/code&gt;&lt;\/a&gt; creates a static offer for the amount selected by the user.&lt;\/li&gt;\n&lt;\/ul&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;capital_api&quot;,&quot;category&quot;:&quot;capital_api&quot;},{&quot;id&quot;:&quot;2026-03-10-3gvmp&quot;,&quot;title&quot;:&quot;Capital&quot;,&quot;release_date&quot;:&quot;2026-03-10&quot;,&quot;date&quot;:1773097200000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=capital&amp;utm_source=rss_feed#releaseNote=2026-03-10-capital&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/icons\/capital.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;capital&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;You can now provide users with greater flexibility by enabling dynamic financing offers through the API. Rather than presenting only fixed financing amounts, dynamic offers allow users to select any amount within a specified range.&lt;br \/&gt;\nYou can use this range to, for example, add a slider to your interface so users can choose their preferred financing amount.&lt;\/p&gt;\n&lt;p&gt;Refer to the &lt;a href=\&quot;https:\/\/docs.adyen.com\/capital\/get-grant-offers\/dynamic-offers\/\&quot;&gt;Dynamic offers&lt;\/a&gt; documentation for more details. &lt;\/p&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;capital&quot;,&quot;category&quot;:&quot;capital&quot;},{&quot;id&quot;:&quot;2026-03-09-yadxj&quot;,&quot;title&quot;:&quot;Customer Area&quot;,&quot;release_date&quot;:&quot;2026-03-09&quot;,&quot;date&quot;:1773010800000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;&quot;,&quot;rss_url&quot;:&quot;?customer_area=customer_area&amp;utm_source=rss_feed#releaseNote=2026-03-09-customer-area&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/browser-customer-area-ca.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;customer_area&quot;,&quot;type&quot;:&quot;customer_area&quot;,&quot;value&quot;:&quot;customer_area&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;You can now view a history of changes to sweeps and scheduled payouts.&lt;\/p&gt;\n&lt;ul&gt;\n&lt;li&gt;The audit trail shows when a sweep configuration was created, updated, or deleted, and who performed the action. This helps you identify why scheduled payouts may be blocked. For example, if a sweep is deactivated, you can see which user or action caused the change.&lt;\/li&gt;\n&lt;li&gt;In the Customer Area, go to &lt;strong&gt;Balance Platform&lt;\/strong&gt; &amp;gt; &lt;strong&gt;Balance accounts&lt;\/strong&gt;, select a balance account, then open the &lt;strong&gt;Audit log&lt;\/strong&gt; tab. To access this tab, your administrator must assign the &lt;strong&gt;View transfer schedules audit trail&lt;\/strong&gt; role.&lt;\/li&gt;\n&lt;\/ul&gt;&quot;}],&quot;customer_area&quot;:&quot;customer_area&quot;,&quot;category&quot;:&quot;customer_area&quot;},{&quot;id&quot;:&quot;2026-03-05-hngpb&quot;,&quot;title&quot;:&quot;Platform Experience components&quot;,&quot;release_date&quot;:&quot;2026-03-05&quot;,&quot;date&quot;:1772665200000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;1.10.2&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=platform_experience_components&amp;version=1.10.2&amp;utm_source=rss_feed#releaseNote=2026-03-05-platform-experience-components-1.10.2&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/checkout-components.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;platform_experience_components&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;In the Pay By Link creation component, we added a new &lt;code&gt;fieldsConfig&lt;\/code&gt; &lt;a href=\&quot;https:\/\/docs.adyen.com\/platforms\/build-user-dashboards?component=Pay%2Bby%2BLink&amp;amp;integration=components&amp;amp;version=1.10.x#prefill-data\&quot;&gt;parameter&lt;\/a&gt; that allows you to set hidden and read-only fields to the payment link creation form.&lt;\/p&gt;&quot;},{&quot;type&quot;:&quot;improved&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;Across all components, we improved backward compatibility for legacy custom translations by supporting multi-step key mapping.&lt;\/p&gt;&quot;},{&quot;type&quot;:&quot;fixed&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;ul&gt;\n&lt;li&gt;Across all components, we resolved an issue where clicking the \&quot;Refresh\&quot; button failed to restore expired sessions after long periods of inactivity.&lt;\/li&gt;\n&lt;li&gt;In the Transaction Details component, we resolved an issue that prevented refund details from showing when there was no associated payment transaction.&lt;\/li&gt;\n&lt;li&gt;In the Transaction Details component, we fixed an issue where navigating from refund details to the associated payment details occasionally caused the UI to flicker indefinitely.&lt;\/li&gt;\n&lt;li&gt;In the Dispute Management component, we fixed an issue to ensure that custom CSS class names are correctly applied to custom action buttons.&lt;\/li&gt;\n&lt;\/ul&gt;&quot;},{&quot;type&quot;:&quot;updating&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;\n&lt;div id=\&quot;tabGvEh2\&quot;&gt;\n    &lt;div data-component-wrapper=\&quot;tabs\&quot;&gt;\n        &lt;tabs\n                        :items=\&quot;[{&amp;quot;title&amp;quot;:&amp;quot;npm (recommended)&amp;quot;,&amp;quot;content&amp;quot;:&amp;quot;\\n&amp;lt;p&amp;gt;Install this version of the &amp;lt;a href=\\&amp;quot;https:\\\/\\\/www.npmjs.com\\\/package\\\/@adyen\\\/adyen-platform-experience-web\\\/v\\\/1.10.2\\&amp;quot;&amp;gt;Adyen Platform Experience package&amp;lt;\\\/a&amp;gt;:&amp;lt;\\\/p&amp;gt;\\n&amp;lt;pre&amp;gt;&amp;lt;code class=\\&amp;quot; lance_platform_category&quot;,&quot;value&quot;:&quot;hop&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;Hosted onboarding for &lt;a href=\&quot;https:\/\/docs.adyen.com\/platforms\/verification-requirements?tab=unincorporated_partnership_4_5\&quot;&gt;unincorporated partnerships&lt;\/a&gt; is now generally available.&lt;\/p&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;hop&quot;,&quot;category&quot;:&quot;hop&quot;},{&quot;id&quot;:&quot;2026-02-05-zecvp&quot;,&quot;title&quot;:&quot;Hosted onboarding&quot;,&quot;release_date&quot;:&quot;2026-02-05&quot;,&quot;date&quot;:1770246000000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=hop&amp;utm_source=rss_feed#releaseNote=2026-02-05-hosted-onboarding&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/automatic-onboarding.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;hop&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;div class=\&quot;notices green\&quot;&gt;\n&lt;p&gt;Sneak Peek&lt;\/p&gt;\n&lt;\/div&gt;\n&lt;p&gt;We added a new overview page to help you understand the process of adding decision-makers.&lt;\/p&gt;\n&lt;p&gt;On the new overview page, you can view the list of decision-makers you have successfully added, add new decision-makers, and see a confirmation once the task is complete.&lt;\/p&gt;\n&lt;p&gt;This feature is only available if you are using v3 or v4 for hosted onboarding.&lt;\/p&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;hop&quot;,&quot;category&quot;:&quot;hop&quot;},{&quot;id&quot;:&quot;2026-02-04-hr4w8&quot;,&quot;title&quot;:&quot;Onboarding components&quot;,&quot;release_date&quot;:&quot;2026-02-04&quot;,&quot;date&quot;:1770159600000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;4.0.0&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=onboarding_components&amp;version=4.0.0&amp;utm_source=rss_feed#releaseNote=2026-02-04-onboarding-components-4.0.0&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/checkout-components.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;onboarding_components&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;We have introduced a new version of the &lt;a href=\&quot;\/platforms\/onboard-users\/components?component=Transfer%2BInstrument&amp;amp;integration=components&amp;amp;version=4.0.x\&quot;&gt;Transfer Instrument (v4.x.x)&lt;\/a&gt;, which lets you import and register each component as a standard web component. You can now embed them directly in your templates, regardless of which framework you are using.&lt;\/p&gt;\n&lt;p&gt;Note that this version includes breaking changes and requires you to reintegrate your existing components. We recommend upgrading to v4.x.x to take advantage of new optimizations and future enhancements, as ongoing development will focus on this version. Version 3.x.x will receive only limited maintenance, such as bug fixes.&lt;\/p&gt;&quot;},{&quot;type&quot;:&quot;improved&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;ul&gt;\n&lt;li&gt;Across all components, we reduced the bundle size. Now, only the components you import will be included in your final build.&lt;\/li&gt;\n&lt;li&gt;Across all components, we improved the library&#039;s loading time by implementing lazy loading across all components.&lt;\/li&gt;\n&lt;li&gt;Across all components, we reduced the setup effort. Web components now offer a drop-in experience for a faster integration into your templates.&lt;\/li&gt;\n&lt;\/ul&gt;&quot;},{&quot;type&quot;:&quot;updating&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;Install this version of the &lt;a href=\&quot;https:\/\/www.npmjs.com\/package\/@adyen\/kyc-components\/v\/4.0.0\&quot;&gt;Adyen KYC Components Node.js package&lt;\/a&gt;:&lt;\/p&gt;\n&lt;pre&gt;&lt;code class=\&quot;language-sh\&quot;&gt;npm install @adyen\/kyc-components&lt;\/code&gt;&lt;\/pre&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;onboarding_components&quot;,&quot;category&quot;:&quot;onboarding_components&quot;},{&quot;id&quot;:&quot;2026-02-06-v1ntb&quot;,&quot;title&quot;:&quot;Platform Experience components&quot;,&quot;release_date&quot;:&quot;2026-02-02&quot;,&quot;date&quot;:1769986800000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;1.10.1&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=platform_experience_components&amp;version=1.10.1&amp;utm_source=rss_feed#releaseNote=2026-02-02-platform-experience-components-1.10.1&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/checkout-components.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;platform_experience_components&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;In the Transactions Overview component, we added a new \&quot;Last 180 days\&quot; option to the date filter. This is now the default filter selection.&lt;\/p&gt;&quot;},{&quot;type&quot;:&quot;improved&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;ul&gt;\n&lt;li&gt;In the Transactions Overview component, we updated the PSP reference filter to require a valid length of 16 characters.&lt;\/li&gt;\n&lt;li&gt;In the Transaction Details component, we now show currency codes instead of symbols for transaction summary amounts. This provides increased clarity, especially when viewing multi-currency split payments.&lt;\/li&gt;\n&lt;li&gt;In the Pay By Link components, we improved the mobile button experience across the overview, settings, and creation flows. We also ensured Terms and Conditions are viewed prior to agreement. Finally, we optimized form behavior to ensure searchable fields and error scrolling function correctly. &lt;\/li&gt;\n&lt;\/ul&gt;&quot;},{&quot;type&quot;:&quot;fixed&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;ul&gt;\n&lt;li&gt;In the Transactions Overview component, we fixed an issue to ensure transaction totals correctly reflect the applied filters for the transactions list.&lt;\/li&gt;\n&lt;li&gt;In the Pay By Link creation flow, we fixed the logic to ensure mandatory billing address validation errors trigger correctly when delivery address is marked optional.&lt;\/li&gt;\n&lt;li&gt;In the Pay by Link Overview and Settings components, an issue was resolved where users without the Manage Settings role could still see the settings UI. Although these users were previously unable to save changes, the components now correctly restrict access and hide the settings area based on the user&#039;s permissions.&lt;\/li&gt;\n&lt;\/ul&gt;&quot;},{&quot;type&quot;:&quot;updating&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;\n&lt;div id=\&quot;taboxrwW\&quot;&gt;\n    &lt;div data-component-wrapper=\&quot;tabs\&quot;&gt;\n        &lt;tabs\n                        :items=\&quot;[{&amp;quot;title&amp;quot;:&amp;quot;npm (recommended)&amp;quot;,&amp;quot;content&am uot;embed-script-and-stylesheet_2026-02-06-v1nt_2&amp;quot;,&amp;quot;relation&amp;quot;:&amp;quot;&amp;quot;}]\&quot;\n            :should-update-when-url-changes=&#039;true&#039;&gt;\n        &lt;\/tabs&gt;\n    &lt;\/div&gt;\n&lt;\/div&gt;\n&quot;}],&quot;balance_platform_category&quot;:&quot;platform_experience_components&quot;,&quot;category&quot;:&quot;platform_experience_components&quot;},{&quot;id&quot;:&quot;2026-02-04-ntsvr&quot;,&quot;title&quot;:&quot;Customer Area&quot;,&quot;release_date&quot;:&quot;2026-01-19&quot;,&quot;date&quot;:1768777200000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;&quot;,&quot;rss_url&quot;:&quot;?customer_area=customer_area&amp;utm_source=rss_feed#releaseNote=2026-01-19-customer-area&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/browser-customer-area-ca.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;customer_area&quot;,&quot;type&quot;:&quot;customer_area&quot;,&quot;value&quot;:&quot;customer_area&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;improved&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;The &lt;strong&gt;Payments&lt;\/strong&gt; overview page now remembers your active filters and column selections during your session. Previously, navigating away from the page would reset your search criteria. Now, when you return to the &lt;strong&gt;Payments&lt;\/strong&gt; page, your previous filters and columns remain applied so you can pick up where you left off.&lt;\/p&gt;&quot;}],&quot;customer_area&quot;:&quot;customer_area&quot;,&quot;category&quot;:&quot;customer_area&quot;},{&quot;id&quot;:&quot;2026-01-21-0lcbw&quot;,&quot;title&quot;:&quot;Customer Area&quot;,&quot;release_date&quot;:&quot;2026-01-14&quot;,&quot;date&quot;:1768345200000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;&quot;,&quot;rss_url&quot;:&quot;?customer_area=customer_area&amp;utm_source=rss_feed#releaseNote=2026-01-14-customer-area&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/browser-customer-area-ca.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;customer_area&quot;,&quot;type&quot;:&quot;customer_area&quot;,&quot;value&quot;:&quot;customer_area&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;improved&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;To prepare for the Balance Platform Customer Area (BPCA) deprecation in February 2026, we have improved the user management workflow to help you maintain consistent access levels across platforms. &lt;\/p&gt;\n&lt;p&gt;If a user has an active account in both the BPCA and the Customer Area, admins can now copy the user&#039;s merchant account access and roles from the BPCA to the Customer Area. This makes sure that users can access the same functionalities in the Customer Area without the need to log into the BPCA.&lt;\/p&gt;&quot;}],&quot;customer_area&quot;:&quot;customer_area&quot;,&quot;category&quot;:&quot;customer_area&quot;},{&quot;id&quot;:&quot;2026-01-08-jkhtk&quot;,&quot;title&quot;:&quot;Platform Experience components&quot;,&quot;release_date&quot;:&quot;2026-01-08&quot;,&quot;date&quot;:1767826800000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;1.10.0&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=platform_experience_components&amp;version=1.10.0&amp;utm_source=rss_feed#releaseNote=2026-01-08-platform-experience-components-1.10.0&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/checkout-components.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;  needed.&lt;\/p&gt;&quot;},{&quot;type&quot;:&quot;fixed&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;Across all components, we implemented consistent toggle behavior for filter dropdowns.&lt;\/p&gt;&quot;},{&quot;type&quot;:&quot;known_issues&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;In the Pay by Link Overview and Settings components, an issue was resolved where users without the Manage Settings role could still see the settings UI. Although these users were previously unable to save changes, the components now correctly restrict access and hide the settings area based on the user&#039;s permissions. This fix is included in version 1.10.1.&lt;\/p&gt;&quot;},{&quot;type&quot;:&quot;updating&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;\n&lt;div id=\&quot;tabpPgeS\&quot;&gt;\n    &lt;div data-component-wrapper=\&quot;tabs\&quot;&gt;\n        &lt;tabs\n                        :items=\&quot;[{&amp;quot;title&amp;quot;:&amp;quot;npm (recommended)&amp;quot;,&amp;quot;content&amp;quot;:&amp;quot;\\n&amp;lt;p&amp;gt;Install this version of the &amp;lt;a href=\\&amp;quot;https:\\\/\\\/www.npmjs.com\\\/package\\\/@adyen\\\/adyen-platform-experience-web\\\/v\\\/1.10.0\\&amp;quot;&amp;gt;Adyen Platform Experience package&amp;lt;\\\/a&amp;gt;:&amp;lt;\\\/p&amp;gt;\\n&amp;lt;pre&amp;gt;&amp;lt;code class=\\&amp;quot;language-sh\\&amp;quot;&amp;gt;npm install @adyen\\\/adyen-platform-experience-web@1.10.0&amp;lt;\\\/code&amp;gt;&amp;lt;\\\/pre&amp;gt;\\n&amp;quot;,&amp;quot;altTitle&amp;quot;:&amp;quot;npm-recommended-_2026-01-08-jkht&amp;quot;,&amp;quot;oldTabId&amp;quot;:&amp;quot;npm-recommended-_2026-01-08-jkht_1&amp;quot;,&amp;quot;relation&amp;quot;:&amp;quot;&amp;quot;},{&amp;quot;title&amp;quot;:&amp;quot;Embed script and stylesheet&amp;quot;,&amp;quot;content&amp;quot;:&amp;quot;\\n&amp;lt;p&amp;gt;Embed the Adyen Platform Experience script element and the stylesheet. The script eleme This means that:&lt;\/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;The transaction\u2019s value date that appears in Adyen\u2019s reports now aligns with the value date specified by the card scheme. Previously, Adyen reported the date on which the transaction was booked as its value date.&lt;\/p&gt;\n&lt;\/li&gt;\n&lt;li&gt;\n&lt;p&gt;The timestamp of the value date, expressed in the Europe\/Brussels timezone (CET), is now always populated at midnight on the local timezone of your balance platform. Previously, this was populated at midnight in the CET timezone. For example, if your balance platform\u2019s local timezone is America\/Los Angeles (PST), the timestamp for the value date now shows 09:00 CET (which is the same as 00:00 PST). Previously, the timestamp showed 00:00 CET.&lt;\/p&gt;\n&lt;\/li&gt;\n&lt;\/ul&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;reports&quot;,&quot;category&quot;:&quot;reports&quot;},{&quot;id&quot;:&quot;2025-09-01-mpy9c&quot;,&quot;title&quot;:&quot;Balance Platform Customer Area&quot;,&quot;release_date&quot;:&quot;2025-09-01&quot;,&quot;date&quot;:1756677600000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=balance_platform_app&amp;utm_source=rss_feed#releaseNote=2025-09-01-balance-platform-customer-area&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/browser-customer-area-ca.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;balance_platform_app&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;improved&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;We&#039;ve improved the &lt;strong&gt;Status&lt;\/strong&gt; filter on the &lt;strong&gt;Transfers&lt;\/strong&gt; page. Pr test&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;&quot;,&quot;rss_url&quot;:&quot;?customer_area=customer_area&amp;utm_source=rss_feed#releaseNote=2025-04-07-customer-area&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/browser-customer-area-ca.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;customer_area&quot;,&quot;type&quot;:&quot;customer_area&quot;,&quot;value&quot;:&quot;customer_area&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;You can now sign up to receive proactive notifications when your Balance Platform webhooks encounter issues. Alerts can be set up to send emails, or display in the Customer Area notification center.&lt;\/p&gt;\n&lt;p&gt;Adyen sends notifications for:&lt;\/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Initial Failure&lt;\/strong&gt;: Receive an alert when we detect that your webhook endpoint is consistently failing to accept events.&lt;\/li&gt;\n&lt;li&gt;&lt;strong&gt;Ongoing Failure&lt;\/strong&gt;: Get notified if a failing endpoint remains unresponsive for an extended period.&lt;\/li&gt;\n&lt;li&gt;&lt;strong&gt;Recovery&lt;\/strong&gt;: Be informed when a previously failing webhook endpoint successfully starts accepting events again.&lt;\/li&gt;\n&lt;\/ul&gt;\n&lt;p&gt;To learn more, see &lt;a href=\&quot;https:\/\/docs.adyen.com\/development-resources\/webhooks\/configure-and-manage\#webhook-alerts\&quot;&gt;Manage webhooks&lt;\/a&gt;.&lt;\/p&gt;&quot;},{&quot;type&quot;:&quot;improved&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;We have extended the date range for searching webhook event logs in the Customer Area. You can now view logs as old as thirty days. &lt;\/p&gt;\n&lt;p&gt;To learn more, see &lt;a href=\&quot;https:\/\/docs.adyen.com\/development-resources\/logs-resources\/webhook-event-logs\/\&quot;&gt;Webhook event logs&lt;\/a&gt;.&lt;\/p&gt;&quot;}],&quot;customer_area&quot;:&quot;customer_area&quot;,&quot;category&quot;:&quot;customer_area&quot;},{&quot;id&quot;:&quot;2025-03-26-ic5ue&quot;,&quot;title&quot;:&quot;Platform Experience components&quot;,&quot;release_date&quot;:&quot;2025-03-26&quot;,&quot;date&quot;:1742943600000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;1.4.1&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=platform_experience_components&amp;version=1.4.1&amp;utm_source=rss_feed#releaseNote=2025-03-26-platform-experience-components-1.4.1&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/checkout-components.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;platform_experience_components&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;fixed&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;We fixed the issue where an application that hosts components failed to load on older web browsers.&lt;\/p&gt;&quot;},{&quot;type&quot;:&quot;updating&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;Install this version of the &lt;a href=\&quot;https:\/\/www.npmjs.com\/package\/@adyen\/adyen-platform-experience-web\/v\/1.4.1\&quot;&gt;Adyen Platform Experience package&lt;\/a&gt;:&lt;\/p&gt;\n&lt;pre&gt;&lt;code class=\&quot;language-sh\&quot;&gt;npm install @adyen\/adyen-platform-experience-web@1.4.1&lt;\/code&gt;&lt;\/pre&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;platform_experience_components&quot;,&quot;category&quot;:&quot;platform_experience_components&quot;},{&quot;id&quot;:&quot;2025-03-26-o1blz&quot;,&quot;title&quot;:&quot;Platform Experience components&quot;,&quot;release_date&quot;:&quot;2025-03-25&quot;,&quot;date&quot;:1742857200000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;1.4.0&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=platform_experience_components&amp;version=1.4.0&amp;utm_source=rss_feed#releaseNote=2025-03-25-platform-experience-components-1.4.0&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/checkout-components.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;platform_experience_components&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;ul&gt;\n&lt;li&gt;In the Capital Overview component, you can now view bank account details needed to send &lt;a href=\&quot;\/capital\/capital-components\#capital-overview-component\&quot;&gt;unscheduled repayments&lt;\/a&gt;, such as early repayments or to catch up if behind schedule.&lt;\/li&gt;\n&lt;li&gt;You can now add custom data in your &lt;a href=\&quot;https:\/\/docs.adyen.com\/platforms\/build-user-dashboards\/transaction-components\/\&quot;&gt;transaction&lt;\/a&gt;, &lt;a href=\&quot;https:\/\/docs.adyen.com\/platforms\/build-user-dashboards\/payout-components\/\&quot;&gt;payout&lt;\/a&gt;, and &lt;a href=\&quot;https:\/\/docs.adyen.com\/platforms\/build-user-dashboards\/reports-component\/\&quot;&gt;report&lt;\/a&gt; components, such as your own fields, icons, links, and buttons. Additionally, you have control over the field settings, including their names and visibility.&lt;\/li&gt;\n&lt;\/ul&gt;&quot;},{&quot;type&quot;:&quot;improved&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;ul&gt;\n&lt;li&gt;In the Capital Offer component, the &lt;strong&gt;Request funds&lt;\/strong&gt; button is now disabled after a successful funds request.&lt;\/li&gt;\n&lt;li&gt;We improved responsiveness of the components by swapping all media queries with container queries.&lt;\/li&gt;\n&lt;\/ul&gt;&quot;},{&quot;type&quot;:&quot;fixed&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;We fixed the issue where the balance account selector in the Payouts, Reports, and Transactions Overview components failed to load if no balance account descriptions were provided.&lt;\/p&gt;&quot;},{&quot;type&quot;:&quot;updating&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;Install this version of the &lt;a href=\&quot;https:\/\/www.npmjs.com\/package\/@adyen\/adyen-platform-experience-web\/v\/1.4.0\&quot;&gt;Adyen Platform Experience package&lt;\/a&gt;:&lt;\/p&gt;\n&lt;pre&gt;&lt;code class=\&quot;language-sh\&quot;&gt;npm install @adyen\/adyen-platform-experience-web@1.4.0&lt;\/code&gt;&lt;\/pre&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;platform_experience_components&quot;,&quot;category&quot;:&quot;platform_experience_components&quot;},{&quot;id&quot;:&quot;2025-03-19-mzcee&quot;,&quot;title&quot;:&quot;Hosted onboarding&quot;,&quot;release_date&quot;:&quot;2025-03-19&quot;,&quot;date&quot;:1742338800000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=hop&amp;utm_source=rss_feed#releaseNote=2025-03-19-hosted-onboarding&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/automatic-onboarding.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;hop&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;If you have a &lt;a href=\&quot;https:\/\/docs.adyen.com\/platforms\/\&quot;&gt;platform&lt;\/a&gt; setup,  you can now use &lt;a href=\&quot;https:\/\/docs.adyen.com\/platforms\/onboard-users\#hosted-onboarding\&quot;&gt;onboarding on invite&lt;\/a&gt; as an alternative option to implement hosted onboarding. Onboarding on invite allows you to perform all required actions in your Customer Area.&lt;\/p&gt;\n&lt;p&gt;You only need to request Adyen to create an account holder for your user. You then can generate a hosted onboarding link to redirect your users to an Adyen-hosted page. Adyen automatically creates the necessary resources and configures default payment methods for your user.&lt;\/p&gt;\n&lt;p&gt;To learn more, see &lt;a href=\&quot;https:\/\/docs.adyen.com\/platforms\/onboard-users\/onboarding-steps\/\&quot;&gt;Onboarding steps&lt;\/a&gt;.&lt;\/p&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;hop&quot;,&quot;category&quot;:&quot;hop&quot;},{&quot;id&quot;:&quot;2025-03-17-yiyxs&quot;,&quot;title&quot;:&quot;Onboarding&quot;,&quot;release_date&quot;:&quot;2025-03-17&quot;,&quot;date&quot;:1742166000000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=onboarding&amp;utm_source=rss_feed#releaseNote=2025-03-17-onboarding&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/user.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;onboarding&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;removed&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;You can no longer update the KYC details linked to the legal entity of your liable account holder using the &lt;a href=\&quot;https:\/\/ca-test.adyen.com\/\&quot; target=\&quot;_blank\&quot; rel=\&quot;nofollow noopener noreferrer\&quot; class=\&quot;external-link no-image\&quot;&gt;Customer Area&lt;\/a&gt; or hosted onboarding. To update the details, reach out to our &lt;a href=\&quot;https:\/\/ca-test.adyen.com\/ca\/ca\/contactUs\/support.shtml?form=other\&quot; target=\&quot;_blank\&quot; rel=\&quot;nofollow noopener noreferrer\&quot; class=\&quot;external-link no-image\&quot;&gt;Support Team&lt;\/a&gt;.&lt;\/p&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;onboarding&quot;,&quot;category&quot;:&quot;onboarding&quot;},{&quot;id&quot;:&quot;2025-03-11-issng&quot;,&quot;title&quot;:&quot;Webhooks&quot;,&quot;release_date&quot;:&quot;2025-03-11&quot;,&quot;date&quot;:1741647600000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:&quot;&lt;p&gt;&lt;strong&gt;Transfer Webhooks&lt;\/strong&gt;&lt;\/p&gt;&quot;,&quot;version&quot;:&quot;4&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=webhooks&amp;version=4&amp;utm_source=rss_feed#releaseNote=2025-03-11-webhooks-4&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/paper-plane.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;webhooks&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;For webhooks related to &lt;a href=\&quot;https:\/\/docs.adyen.com\/issuing\/\&quot;&gt;Adyen-issued cards&lt;\/a&gt;, you can now use  &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/transfer-webhooks\/latest\/post\/balancePlatform.transfer.updated#request-data-eventId\&quot; class=\&quot;codeLabel  external-link no-image\&quot; target=\&quot;_blank\&quot; rel=\&quot;nofollow noopener noreferrer\&quot;&gt;data.eventId&lt;\/a&gt; to identify the event for which a transfer webhook is sent.&lt;\/p&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;webhooks&quot;,&quot;category&quot;:&quot;webhooks&quot;},{&quot;id&quot;:&quot;2025-03-10-nqo0i&quot;,&quot;title&quot;:&quot;Hosted onboarding&quot;,&quot;release_date&quot;:&quot;2025-03-10&quot;,&quot;date&quot;:1741561200000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=hop&amp;utm_source=rss_feed#releaseNote=2025-03-10-hosted-onboarding&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/automatic-onboarding.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;hop&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;Hosted onboarding now features a web-based user interface (UI) that allows you to diagnose and resolve issues encountered by your users during the onboarding process.&lt;\/p&gt;\n&lt;p&gt;The debug UI is enabled by default. You can control its availability by adjusting the &lt;code&gt;allowDebugUi&lt;\/code&gt; setting when creating a hosted onboarding link. &lt;\/p&gt;\n&lt;p&gt;For more information, see &lt;a href=\&quot;https:\/\/docs.adyen.com\/platforms\/onboard-users\/customize-hosted-onboarding#troubleshoot\&quot;&gt;Troubleshoot hosted onboarding&lt;\/a&gt;.&lt;\/p&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;hop&quot;,&quot;category&quot;:&quot;hop&quot;},{&quot;id&quot;:&quot;2025-03-03-8nim5&quot;,&quot;title&quot;:&quot;Configuration API&quot;,&quot;release_date&quot;:&quot;2025-03-04&quot;,&quot;date&quot;:1741042800000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version& ;\&quot;&gt;Final auth&lt;\/td&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;All&lt;\/td&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;7 days&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;Mastercard&lt;\/td&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;All&lt;\/td&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;All&lt;\/td&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;Pre-auth&lt;\/td&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;All&lt;\/td&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;30 days&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;\/tbody&gt;\n&lt;\/table&gt;\n&lt;h3&gt;Visa&lt;\/h3&gt;\n&lt;table&gt;\n&lt;thead&gt;\n&lt;tr&gt;\n&lt;th style=\&quot;text-align: left;\&quot;&gt;Scheme&lt;\/th&gt;\n&lt;th style=\&quot;text-align: left;\&quot;&gt;Debit\/credit&lt;\/th&gt;\n&lt;th style=\&quot;text-align: left;\&quot;&gt;Environment&lt;\/th&gt;\n&lt;th style=\&quot;text-align: left;\&quot;&gt;&lt;a href=\&quot;#authorisation-types\&quot;&gt;Authorization type&lt;\/a&gt;&lt;\/th&gt;\n&lt;th style=\&quot;text-align: left;\&quot;&gt;MCC&lt;\/th&gt;\n&lt;th style=\&quot;text-align: left;\&quot;&gt;Days&lt;\/th&gt;\n&lt;\/tr&gt;\n&lt;\/thead&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;Visa&lt;\/td&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;All&lt;\/td&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;All&lt;\/td&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;All&lt;\/td&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;Cruise, Lodging, Vehicle Rental&lt;\/td&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;31 days&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;Visa&lt;\/td&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;All&lt;\/td&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;All&lt;\/td&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;All&lt;\/td&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;US Commuter Transportation, Bus, Railway Merchants&lt;\/td&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;3 days&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;Visa&lt;\/td&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;All&lt;\/td&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;All&lt;\/td&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;All&lt;\/td&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;Others&lt;\/td&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;7 days&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;\/tbody&gt;\n&lt;\/table&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;issuing_general&quot;,&quot;category&quot;:&quot;issuing_general&quot;},{&quot;id&quot;:&quot;2024-03-19-vkdyb&quot;,&quot;title&quot;:&quot;Balance Platform Customer Area&quot;,&quot;release_date&quot;:&quot;2024-03-18&quot;,&quot;date&quot;:1710716400000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=balance_platform_app&amp;utm_source=rss_feed#releaseNote=2024-03-18-balance-platform-customer-area&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/browser-customer-area-ca.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;balance_platform_app&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;When you are initiating a transfer to a transfer instrument, you can now set a &lt;a href=\&quot;\/platforms\/payout-to-users#transfer-priority\&quot;&gt;transfer priority&lt;\/a&gt;.&lt;\/p&gt;&quot;},{&quot;type&quot;:&quot;improved&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;Users can no longer view the &lt;strong&gt;Report overview&lt;\/strong&gt; page and download reports with the &lt;strong&gt;Balance platform base role&lt;\/strong&gt;.&lt;\/p&gt;\n&lt;p&gt;To access the Report overview page, you need one of the following &lt;a href=\&quot;\/account\/user-roles\/\&quot;&gt;roles&lt;\/a&gt;:&lt;\/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Balance platform admin role&lt;\/li&gt;\n&lt;li&gt;Generate and schedule reports &lt;\/li&gt;\n&lt;li&gt;Download reports&lt;\/li&gt;\n&lt;\/ul&gt;&quot;},{&quot;type&quot;:&quot;fixed&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;In &lt;strong&gt;Transfers&lt;\/strong&gt; &amp;gt; &lt;strong&gt;Transfer details&lt;\/strong&gt;, we fixed an error that caused the wrong bank account to appear in the &lt;strong&gt;Counterparty details&lt;\/strong&gt;. This only affected counterparty transfer instruments that had their bank account updated.&lt;\/p&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;balance_platform_app&quot;,&quot;category&quot;:&quot;balance_platform_app&quot;},{&quot;id&quot;:&quot;2024-04-16-n4sde&quot;,&quot;title&quot;:&quot;Configuration API&quot;,&quot;release_date&quot;:&quot;2024-03-11&quot;,&quot;date&quot;:1710111600000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=balance_platform_configuration_api&amp;utm_source=rss_feed#releaseNote=2024-03-11-configuration-api&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/code.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;balance_platform_configuration_api&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;improved&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;When an attempt to update an account holder fails because their primary balance account is inactive, you now receive a more descriptive error message: &lt;code&gt;Primary balance account is not active&lt;\/code&gt; instead of &lt;code&gt;Account is not active&lt;\/code&gt;. &lt;\/p&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;balance_platform_configuration_api&quot;,&quot;category&quot;:&quot;balance_platform_configuration_api&quot;},{&quot;id&quot;:&quot;2024-03-08-zjtfr&quot;,&quot;title&quot;:&quot;General&quot;,&quot;release_date&quot;:&quot;2024-03-07&quot;,&quot;date&quot;:1709766000000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:&quot;&lt;p&gt;Legal Entity Management, Configuration, and Transfers APIs are supported in API logs&lt;\/p&gt;&quot;,&quot;version&quot;:&quot;&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=issuing_general&amp;utm_source=rss_feed#releaseNote=2024-03-07-general&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen-docs\/assets\/icons\/issuing.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;issuing_general&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;changed&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;&lt;strong&gt;Legal Entity Management, Configuration, and Transfers APIs are supported in API logs&lt;\/strong&gt;&lt;\/p&gt;\n&lt;p&gt;More API requests on live environments are available for inspection in your Customer Area &lt;a href=\&quot;\/development-resources\/logs-resources\/api-logs\/\&quot;&gt;API logs&lt;\/a&gt;.  &lt;\/p&gt;\n&lt;p&gt;API log entries for the following APIs are available for all balance platforms at the company account level:&lt;\/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Legal Entity Management&lt;\/li&gt;\n&lt;li&gt;Configuration&lt;\/li&gt;\n&lt;li&gt;Transfers&lt;\/li&gt;\n&lt;\/ul&gt;\n&lt;p&gt;The same user role requirements apply for viewing API requests in the Customer Area.&lt;\/p&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;issuing_general&quot;,&quot;category&quot;:&quot;issuing_general&quot;},{&quot;id&quot;:&quot;2024-03-04-cm0ex&quot;,&quot;title&quot;:&quot;Hosted onboarding&quot;,&quot;release_date&quot;:&quot;2024-03-04&quot;,&quot;date&quot;:1709506800000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=hop&amp;utm_source=rss_feed#releaseNote=2024-03-04-hosted-onboarding&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/automatic-onboarding.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;hop&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;fixed&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;ul&gt;\n&lt;li&gt;We fixed the issue where the validation for IBANs in Isle of Man, Jersey, and Guernsey was incorrect. The correct IBAN value for these locations begins with &lt;strong&gt;GB&lt;\/strong&gt; and is now accepted.&lt;\/li&gt;\n&lt;li&gt;We updated the Romanian country code to use the current ISO value.&lt;\/li&gt;\n&lt;\/ul&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;hop&quot;,&quot;category&quot;:&quot;hop&quot;},{&quot;id&quot;:&quot;2024-03-04-9rvcc&quot;,&quot;title&quot;:&quot;Webhooks&quot;,&quot;release_date&quot;:&quot;2024-03-04&quot;,&quot;date&quot;:1709506800000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=webhooks&amp;utm_source=rss_feed#releaseNote=2024-03-04-webhooks&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/paper-plane.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;webhooks&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;&lt;strong&gt;Issuing&lt;\/strong&gt;&lt;\/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;We added the &lt;code&gt;schemeUniqueTransactionID&lt;\/code&gt; and &lt;code&gt;schemeTraceID&lt;\/code&gt; fields to &lt;a href=\&quot;https:\/\/docs.adyen.com\/issuing\/authorisation\/relayed-authorisation\/\&quot;&gt;relayed authorisation&lt;\/a&gt; webhooks. This helps with the reconciliation process, to link incremental authorizations and recurring payments to their corresponding initial payment.&lt;\/p&gt;\n&lt;p&gt;Scheme IDs are not always available and should be treated as an additional information to the Transfer and Transaction IDs.&lt;\/p&gt;\n&lt;\/li&gt;\n&lt;\/ul&gt;&quot;},{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;ul&gt;\n&lt;li&gt;We added the &lt;code&gt;acquirerId&lt;\/code&gt; field to  &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/transfer-webhooks\/latest\/overview\&quot; class=\&quot; external-link no-image\&quot; target=\&quot;_blank\&quot; rel=\&quot;nofollow noopener noreferrer\&quot;&gt;Transfer webhooks&lt;\/a&gt; (v3 and v4).&lt;\/li&gt;\n&lt;\/ul&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;webhooks&quot;,&quot;category&quot;:&quot;webhooks&quot;},{&quot;id&quot;:&quot;2024-03-01-vast3&quot;,&quot;title&quot;:&quot;Legal Entity Management API&quot;,&quot;release_date&quot;:&quot;2024-03-01&quot;,&quot;date&quot;:1709247600000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=legal_entity_api&amp;utm_source=rss_feed#releaseNote=2024-03-01-legal-entity-management-api&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/code.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;legal_entity_api&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;When creating individual legal entities, we added validations so that first and last names must be submitted in the API request.&lt;\/p&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;legal_entity_api&quot;,&quot;category&quot;:&quot;legal_entity_api&quot;},{&quot;id&quot;:&quot;2024-02-27-yunlr&quot;,&quot;title&quot;:&quot;Onboarding&quot;,&quot;release_date&quot;:&quot;2024-03-01&quot;,&quot;date&quot;:1709247600000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:&quot;&lt;p&gt;This summarizes the most important changes in Onboarding v3, which includes both the Legal Entity Management API and Hosted Onboarding&lt;\/p&gt;&quot;,&quot;version&quot;:&quot;3&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=onboarding&amp;version=3&amp;utm_source=rss_feed#releaseNote=2024-03-01-onboarding-3&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/user.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;onboarding&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;improved&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;&lt;strong&gt;Improved information and validations for transfer instrument creation&lt;\/strong&gt;&lt;\/p&gt;\n&lt;p&gt;When creating a  &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/latest\/post\/transferInstruments\&quot; class=\&quot; external-link no-image\&quot; target=\&quot;_blank\&quot; rel=\&quot;nofollow noopener noreferrer\&quot;&gt;transfer instrument&lt;\/a&gt; in v1 and v2, the &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/2\/post\/transferInstruments#request-bankAccount\&quot; class=\&quot;codeLabel\&quot;&gt;bankAccount&lt;\/a&gt; object does not specify the required information required for accounts based on the country and currency combination. &lt;\/p&gt;\n&lt;p&gt;We added the  &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/latest\/post\/transferInstruments#request-type\&quot; class=\&quot;codeLabel  external-link no-image\&quot; target=\&quot;_blank\&quot; rel=\&quot;nofollow noopener noreferrer\&quot;&gt;type&lt;\/a&gt; field. This field specifies, for example, the bank account is a local account in the United States, and the required information based on that type. &lt;\/p&gt;\n&lt;p&gt;For a US bank account, set the &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/3\/post\/transferInstruments#request-bankAccount-accountIdentification-USLocalAccountIdentification-type\&quot; class=\&quot;codeLabel\&quot;&gt;type&lt;\/a&gt; to &lt;strong&gt;usLocal&lt;\/strong&gt;. When the type is &lt;strong&gt;usLocal&lt;\/strong&gt;, the fields &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/3\/post\/transferInstruments#request-bankAccount-accountIdentification-USLocalAccountIdentification-accountNumber\&quot; class=\&quot;codeLabel\&quot;&gt;accountNumber&lt;\/a&gt; and &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/3\/post\/transferInstruments#request-bankAccount-accountIdentification-USLocalAccountIdentification-routingNumber\&quot; class=\&quot;codeLabel\&quot;&gt;routingNumber&lt;\/a&gt; are required. For UK bank accounts, the &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/3\/post\/transferInstruments#request-bankAccount-accountIdentification-UKLocalAccountIdentification-type\&quot; class=\&quot;codeLabel\&quot;&gt;type&lt;\/a&gt; is &lt;strong&gt;ukLocal&lt;\/strong&gt; and the required fields are &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/3\/post\/transferInstruments#request-bankAccount-accountIdentification-UKLocalAccountIdentification-accountNumber\&quot; class=\&quot;codeLabel\&quot;&gt;accountNumber&lt;\/a&gt; and &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/3\/post\/transferInstruments#request-bankAccount-accountIdentification-UKLocalAccountIdentification-sortCode\&quot; class=\&quot;codeLabel\&quot;&gt;sortCode&lt;\/a&gt;.&lt;\/p&gt;\n&lt;p&gt;In LEM v3, the &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/2\/post\/transferInstruments#request-bankAccount-currencyCode\&quot; class=\&quot;codeLabel\&quot;&gt;currencyCode&lt;\/a&gt; has been removed from the bank account object since it is not needed to create a transfer instrument. If you need to block the creation of cross-border transfer instruments, you can use the  &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/latest\/post\/transferInstruments#request--bankAccount-countryCode\&quot; class=\&quot;codeLabel  external-link no-image\&quot; target=\&quot;_blank\&quot; rel=\&quot;nofollow noopener noreferrer\&quot;&gt;countryCode&lt;\/a&gt; of the transfer instrument and the country of the associated legal entity.&lt;\/p&gt;&quot;},{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;&lt;strong&gt;Support for multiple transfer instruments&lt;\/strong&gt;&lt;\/p&gt;\n&lt;p&gt;The capability &lt;strong&gt;sendToTransferInstrument&lt;\/strong&gt; is now validated at both the transfer instrument resource and associated legal entity level. Previously, this capability was only validated at the legal entity level, which prevented payouts for users with multiple bank accounts that were not all verified. The &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/3\/post\/transferInstruments#responses-200-capabilities-verificationStatus\&quot; class=\&quot;codeLabel\&quot;&gt;verificationStatus&lt;\/a&gt; of the capability and any &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/3\/post\/transferInstruments#responses-200-problems-verificationErrors\&quot; class=\&quot;codeLabel\&quot;&gt;verfificationErrors&lt;\/a&gt; are returned:&lt;\/p&gt;\n&lt;ul&gt;\n&lt;li&gt;by making a GET &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/3\/get\/transferInstruments\/_id_\&quot; class=\&quot;codeLabel\&quot;&gt;\/transferInstruments\/id&lt;\/a&gt; request.&lt;\/li&gt;\n&lt;li&gt;by listening to &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\#\/balanceplatform-webhooks\/latest\/post\/balancePlatform.accountHolder.updated\&quot; class=\&quot;codeLabel external-link no-image\&quot; target=\&quot;_blank\&quot; rel=\&quot;nofollow noopener noreferrer\&quot;&gt;balancePlatform.accountHolder.updated&lt;\/a&gt; webhooks.&lt;\/li&gt;\n&lt;\/ul&gt;&quot;},{&quot;type&quot;:&quot;changed&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;&lt;strong&gt;Aligning business lines with Adyen products and services&lt;\/strong&gt;&lt;\/p&gt;\n&lt;p&gt;We replaced the &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/3\/post\/businessLines#request-capability\&quot; class=\&quot;codeLabel\&quot;&gt;capability&lt;\/a&gt; field with the &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/3\/post\/businessLines#request-service\&quot; class=\&quot;codeLabel\&quot;&gt;service&lt;\/a&gt; field. The &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/3\/post\/businessLines#request-capability\&quot; class=\&quot;codeLabel\&quot;&gt;capability&lt;\/a&gt; field is now deprecated. The possible values for &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/3\/post\/businessLines#request-service\&quot; class=\&quot;codeLabel\&quot;&gt;service&lt;\/a&gt; are:&lt;\/p&gt;\n&lt;p&gt;-&lt;strong&gt;paymentProcessing&lt;\/strong&gt;: corresponds to capability &lt;strong&gt;receivePayments&lt;\/strong&gt;.&lt;br \/&gt;\n-&lt;strong&gt;banking&lt;\/strong&gt; corresponds to capability &lt;strong&gt;issueBankAccount&lt;\/strong&gt;.&lt;\/p&gt;\n&lt;p&gt;Note that you still must &lt;a href=\&quot;\/platforms\/manage-account-holders\#request-capability\&quot;&gt;request capabilities&lt;\/a&gt; for your account holders.&lt;\/p&gt;&quot;},{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;&lt;strong&gt;Compliance requirements for Onboarding v3&lt;\/strong&gt;&lt;\/p&gt;\n&lt;div class=\&quot;sticky-table-container\&quot;&gt;\n    \n&lt;table&gt;\n&lt;thead&gt;\n&lt;tr&gt;\n&lt;th style=\&quot;text-align: left;\&quot;&gt;Description&lt;\/th&gt;\n&lt;th style=\&quot;text-align: left;\&quot;&gt;Details&lt;\/th&gt;\n&lt;\/tr&gt;\n&lt;\/thead&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;&lt;a href=\&quot;#data-review\&quot;&gt;Data review&lt;\/a&gt;&lt;\/td&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;Adyen may occasionally require your users to review and confirm that their data is up-to-date.&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;Required information and verification checks&lt;\/td&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;The following requirements are enforced during the &lt;a href=\&quot;\/platforms\/onboard-users\/\&quot;&gt;verification process&lt;\/a&gt;. &lt;ul&gt;&lt;li&gt;Authorized signatory mandatory for companies.&lt;\/li&gt;&lt;li&gt;Email address and phone number mandatory for individuals.&lt;\/li&gt;&lt;li&gt; Job title mandatory for authorized signatories and UBOs through control.&lt;\/li&gt;&lt;li&gt;The legal structure of the company is mandatory.&lt;\/li&gt;&lt;li&gt;The complete address of the legal entity is mandatory.&lt;\/li&gt;&lt;li&gt; VAT number required in countries with VAT system.&lt;\/li&gt;&lt;li&gt;Industry code and web data information mandatory for &lt;a href=\&quot;\/platforms\&quot;&gt;platform setups&lt;\/a&gt;.&lt;\/li&gt;&lt;li&gt;The &lt;a href=\&quot;\/platforms\&quot;&gt;platform setup&lt;\/a&gt; and &lt;a href=\&quot;\/platforms\/financial-products\&quot;&gt;financial products&lt;\/a&gt; are not offered to individual legal entities.&lt;\/li&gt;&lt;li&gt;&lt;a href=\&quot;\/platforms\/verification-requirements\/reference-additional-products\#list-industry-codes\&quot;&gt;Industry codes&lt;\/a&gt; are mandatory for &lt;a href=\&quot;\/platforms\/verification-requirements\/?tab=business-accounts_1\&quot;&gt;business accounts&lt;\/a&gt;.&lt;\/li&gt;&lt;\/ul&gt;&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;Requirements in APAC countries&lt;\/td&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;&lt;ul&gt;&lt;li&gt; Tax ID is mandatory for &lt;a href=\&quot;\/platforms\/verification-requirements\/?tab=business-accounts_1\&quot;&gt;business accounts&lt;\/a&gt; and countries without a VAT system.&lt;\/li&gt;&lt;li&gt;The date of incorporation is mandatory for organizations in Singapore and Hong Kong.&lt;\/li&gt;&lt;li&gt;Nationality is required for natural persons in Singapore and Hong Kong.&lt;\/li&gt;&lt;li&gt; Director is a mandatory  &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/latest\/patch\/legalEntities\/(id)#request-entityAssociations-type\&quot; class=\&quot;codeLabel  external-link no-image\&quot; target=\&quot;_blank\&quot; rel=\&quot;nofollow noopener noreferrer\&quot;&gt;type&lt;\/a&gt; for organizations in Hong Kong, Singapore, Australia, New Zealand, Brazil, and the US when &lt;a href=\&quot;\/platforms\/onboard-users\/onboarding-steps\&quot;&gt;associating legal entities&lt;\/a&gt;.&lt;\/li&gt;&lt;li&gt;ID number is mandatory for natural persons in Singapore, Hong Kong, United States, and Brazil.&lt;\/li&gt;&lt;li&gt;The required number of members must be provided for &lt;a href=\&quot;\/platforms\/verification-requirements\/?tab=trust_4#members\&quot;&gt;trusts&lt;\/a&gt; and partnerships.&lt;\/li&gt;&lt;\/ul&gt;&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;&lt;a href=\&quot;#tos-pci\&quot;&gt;Terms of Service and PCI&lt;\/a&gt;&lt;\/td&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;If you are using custom onboarding, confirm that your user has &lt;a href=\&quot;\/platforms\/onboard-users\/terms-of-service\/\&quot;&gt;accepted the Terms of Service&lt;\/a&gt; or &lt;a href=\&quot;\/platforms\/onboard-users\/pci-forms\/\&quot;&gt;signed self-assessment questionnaires&lt;\/a&gt;.&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;Business lines&lt;\/td&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;&lt;a href=\&quot;\/platforms\&quot;&gt;Payment facilitators&lt;\/a&gt; need to create business lines when onboarding users.&lt;\/td&gt;\n&lt;td&gt;\n&lt;\/div&gt;\n&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;\/tbody&gt;\n&lt;\/table&gt;&quot;},{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;&lt;strong&gt;Verification deadlines and data reviews&lt;\/strong&gt;&lt;\/p&gt;\n&lt;p&gt;When a user updated their data in LEM v1 and v2, their &lt;a href=\&quot;\/platforms\/verification-overview\/capabilities\/\&quot;&gt;capabilities&lt;\/a&gt; were disallowed until verification checks were completed. We now provide a &lt;a href=\&quot;\/platforms\/verification-overview\#when-the-verification-process-happens\&quot;&gt;verification deadline&lt;\/a&gt;. They are allowed to continue using the capabilities while the deadline is active.&lt;\/p&gt;\n&lt;p&gt;We now inform you when your user needs to &lt;a href=\&quot;\/platforms\/verification-overview\&quot;&gt;review their data&lt;\/a&gt; by sending a &lt;a href=\&quot;\/platforms\/verification-overview#review-required\&quot;&gt;verification error&lt;\/a&gt; \&quot;Review of data is required\&quot; in a webhook. There is a verification deadline to review their data and they are allowed to continue using their capabilities while the deadline is active. To resolve the error, make a POST  &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/latest\/post\/legalEntities\/(id)\/confirmDataReview\&quot; class=\&quot;codeLabel  external-link no-image\&quot; target=\&quot;_blank\&quot; rel=\&quot;nofollow noopener noreferrer\&quot;&gt;\/legalEntities\/{id}\/confirmDataReview&lt;\/a&gt; request to confirm the user has reviewed their data.&lt;\/p&gt;&quot;},{&quot;type&quot;:&quot;changed&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;&lt;strong&gt;Error responses for legal entities&lt;\/strong&gt;&lt;\/p&gt;\n&lt;p&gt;In the &lt;code&gt;\/legalEntities&lt;\/code&gt; responses for POST, PATCH, and GET, we separated the status of capabilities from the problems that you need to resolve. We also grouped together the problems per type of capability.&lt;\/p&gt;\n&lt;p&gt;We also added a new endpoint &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/3\/post\/legalEntities\/_id_\/checkVerificationErrors\&quot; class=\&quot;codeLabel\&quot;&gt;\/legalEntities\/{id}\/checkVerificationErrors&lt;\/a&gt; returns only the &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/3\/post\/legalEntities\/_id_\/checkVerificationErrors#responses-200-problems-verificationErrors\&quot; class=\&quot;codeLabel\&quot;&gt;verificationErrors&lt;\/a&gt; for a legal entity in the response without any additional details.&lt;\/p&gt;&quot;},{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;&lt;strong&gt;Terms of Service and PCI requirements&lt;\/strong&gt;&lt;\/p&gt;\n&lt;p&gt;Adyen now determines if your users need to accept the &lt;a href=\&quot;\/platforms\/onboard-users\/terms-of-service\/\&quot;&gt;Terms of Service&lt;\/a&gt; and sign &lt;a href=\&quot;\/platforms\/onboard-users\/pci-forms\/\&quot;&gt;self-assessment questionnaires&lt;\/a&gt; to comply with Payment Card Industry Data Security Standards (PCI DSS).&lt;\/p&gt;\n&lt;p&gt;If you are using &lt;a href=\&quot;\/platforms\/onboard-users\/onboarding-steps\&quot;&gt;hosted onboarding&lt;\/a&gt;, these steps are included in the user&#039;s hosted onboarding page. For &lt;a href=\&quot;\/platforms\/onboard-users\&quot;&gt;custom onboarding&lt;\/a&gt;, listen to webhooks and follow the steps to have your user &lt;a href=\&quot;\/platforms\/onboard-users\/terms-of-service\/\&quot;&gt;accept the Terms of Service&lt;\/a&gt; or &lt;a href=\&quot;\/platforms\/onboard-users\/pci-forms\/\&quot;&gt;sign self-assessment questionnaires&lt;\/a&gt;.&lt;\/p&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;onboarding&quot;,&quot;category&quot;:&quot;onboarding&quot;},{&quot;id&quot;:&quot;2024-04-16-aequk&quot;,&quot;title&quot;:&quot;General&quot;,&quot;release_date&quot;:&quot;2024-02-26&quot;,&quot;date&quot;:1708902000000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=issuing_general&amp;utm_source=rss_feed#releaseNote=2024-02-26-general&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen-docs\/assets\/icons\/issuing.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;issuing_general&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;When you &lt;a href=\&quot;\/platforms\/automatic-split-configuration\/create-split-configuration\&quot;&gt;create&lt;\/a&gt; or &lt;a href=\&quot;\/platforms\/automatic-split-configuration\/manage-split-configurations\&quot;&gt;manage&lt;\/a&gt; your split configuration profiles in your &lt;a href=\&quot;https:\/\/ca-test.adyen.com\/\&quot; target=\&quot;_blank\&quot; rel=\&quot;nofollow noopener noreferrer\&quot; class=\&quot;external-link no-image\&quot;&gt;Customer Area&lt;\/a&gt;, you can now also define the funding source as a payment condition (rule). &lt;\/p&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;issuing_general&quot;,&quot;category&quot;:&quot;issuing_general&quot;},{&quot;id&quot;:&quot;2024-02-27-edphk&quot;,&quot;title&quot;:&quot;Balance Platform Customer Area&quot;,&quot;release_date&quot;:&quot;2024-02-26&quot;,&quot;date&quot;:1708902000000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=balance_platform_app&amp;utm_source=rss_feed#releaseNote=2024-02-26-balance-platform-customer-area&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/browser-customer-area-ca.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;balance_platform_app&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;In &lt;strong&gt;Accounts &amp;amp; balances&lt;\/strong&gt; &amp;gt; &lt;strong&gt;Balance accounts&lt;\/strong&gt; &amp;gt; &lt;strong&gt;Scheduled transfers&lt;\/strong&gt;, we now display the &lt;a href=\&quot;\/platforms\/payout-to-users\#transfer-priority\&quot;&gt;transfer priorities&lt;\/a&gt; that are configured for a sweep.&lt;\/p&gt;&quot;},{&quot;type&quot;:&quot;fixed&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;In &lt;strong&gt;Account Holder Details&lt;\/strong&gt; &amp;gt; &lt;strong&gt;Stores&lt;\/strong&gt;, now you can see the correct details in the &lt;strong&gt;Split Configuration ID&lt;\/strong&gt; and &lt;strong&gt;Balance Account&lt;\/strong&gt; fields, instead of &lt;strong&gt;Not available&lt;\/strong&gt;.&lt;\/p&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;balance_platform_app&quot;,&quot;category&quot;:&quot;balance_platform_app&quot;},{&quot;id&quot;:&quot;2024-02-26-uscmg&quot;,&quot;title&quot;:&quot;Hosted onboarding&quot;,&quot;release_date&quot;:&quot;2024-02-26&quot;,&quot;date&quot;:1708902000000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=hop&amp;utm_source=rss_feed#releaseNote=2024-02-26-hosted-onboarding&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/automatic-onboarding.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;hop&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;Individuals in Canada are now only required to upload an ID document if necessary to pass verification checks.&lt;\/p&gt;&quot;},{&quot;type&quot;:&quot;fixed&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;We fixed the issue that caused the temporary unavailability of &lt;a href=\&quot;\/platforms\/onboard-users#instant-bank-account-verification\&quot;&gt;instant bank account verification&lt;\/a&gt; for Canada.&lt;\/p&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;hop&quot;,&quot;category&quot;:&quot;hop&quot;},{&quot;id&quot;:&quot;2024-02-26-vz80p&quot;,&quot;title&quot;:&quot;General&quot;,&quot;release_date&quot;:&quot;2024-02-19&quot;,&quot;date&quot;:1708297200000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=issuing_general&amp;utm_source=rss_feed#releaseNote=2024-02-19-general&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen-docs\/assets\/icons\/issuing.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;issuing_general&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;ul&gt;\n&lt;li&gt;You can now book the different transaction fee types for &lt;a href=\&quot;\/platforms\/online-payments\/transaction-fees\&quot;&gt;online&lt;\/a&gt; and &lt;a href=\&quot;\/platforms\/in-person-payments\/transaction-fees\&quot;&gt;in-person&lt;\/a&gt; payments to specific balance accounts.&lt;\/li&gt;\n&lt;li&gt;If you do not specify split instructions for the transaction fees, Adyen automatically adds the &lt;code&gt;type&lt;\/code&gt; parameter with &lt;strong&gt;PaymentFee&lt;\/strong&gt; value to your payment or capture request, booking all transaction fees to your platform&#039;s liable balance account.&lt;\/li&gt;\n&lt;\/ul&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;issuing_general&quot;,&quot;category&quot;:&quot;issuing_general&quot;},{&quot;id&quot;:&quot;2024-02-26-uk3lg&quot;,&quot;title&quot;:&quot;Checkout API&quot;,&quot;release_date&quot;:&quot;2024-02-19&quot;,&quot;date&quot;:1708297200000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quo
