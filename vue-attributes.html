ty\/latest\/patch\/transferInstruments\/_id_\&quot; class=\&quot;codeLabel\&quot;&gt;PATCH \/transferInstruments&lt;\/a&gt;&lt;\/li&gt;\n&lt;\/ul&gt;\n&lt;p&gt;If successful, the requested verification code resolves any suberrors associated with the legal entity, document, or transfer instrument.&lt;\/p&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;legal_entity_api&quot;,&quot;category&quot;:&quot;legal_entity_api&quot;},{&quot;id&quot;:&quot;2023-08-28-kz2mg&quot;,&quot;title&quot;:&quot;Hosted onboarding&quot;,&quot;release_date&quot;:&quot;2023-08-28&quot;,&quot;date&quot;:1693173600000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=hop&amp;utm_source=rss_feed#releaseNote=2023-08-28-hosted-onboarding&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/automatic-onboarding.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;hop&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;improved&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;We have improved the instant ID verification flow on the hosted onboarding page. These changes include:&lt;\/p&gt;\n&lt;ul&gt;\n&lt;li&gt;More detailed guidance for users about the document requirements and differences between &lt;strong&gt;Instant verification&lt;\/strong&gt; and &lt;strong&gt;Manual upload&lt;\/strong&gt;.&lt;\/li&gt;\n&lt;li&gt;The directions for the instant verification are also translated if a user changes the language of the hosted onboarding page. &lt;\/li&gt;\n&lt;li&gt;Individuals and decision-makers who are US residents now need to accept Onfido&#039;s Terms and Conditions to use the &lt;strong&gt;Instant verification&lt;\/strong&gt; flow.&lt;\/li&gt;\n&lt;li&gt;The flag icon that indicates the country for a phone number is now visible when requesting an SMS link.&lt;\/li&gt;\n&lt;\/ul&gt;&quot;},{&quot;type&quot;:&quot;fixed&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;Users can now submit a Swedish IBAN for their payout account.&lt;\/p&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;hop&quot;,&quot;category&quot;:&quot;hop&quot;},{&quot;id&quot;:&quot;2023-08-28-bpca&quot;,&quot;title&quot;:&quot;Balance Platform Customer Area&quot;,&quot;release_date&quot;:&quot;2023-08-28&quot;,&quot;date&quot;:1693173600000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=balance_platform_app&amp;utm_source=rss_feed#releaseNote=2023-08-28-balance-platform-customer-area&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/browser-customer-area-ca.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;balance_platform_app&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;improved&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;In the &lt;strong&gt;Transfers&lt;\/strong&gt; page, you can now filter transfers based on the &lt;strong&gt;Counterparty country&lt;\/strong&gt;.&lt;\/p&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;balance_platform_app&quot;,&quot;category&quot;:&quot;balance_platform_app&quot;},{&quot;id&quot;:&quot;2023-08-21-issng&quot;,&quot;title&quot;:&quot;General&quot;,&quot;release_date&quot;:&quot;2023-08-21&quot;,&quot;date&quot;:1692568800000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=is ;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;The  &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/payment-webhooks\/latest\/overview\&quot; class=\&quot; external-link no-image\&quot; target=\&quot;_blank\&quot; rel=\&quot;nofollow noopener noreferrer\&quot;&gt;Payment webhooks&lt;\/a&gt; are now deprecated. We recommend that you &lt;a href=\&quot;\/development-resources\/webhooks\/configure-and-manage#configure-customer-area\&quot;&gt;subscribe&lt;\/a&gt; to the new  &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/transfer-webhooks\/latest\/overview\&quot; class=\&quot; external-link no-image\&quot; target=\&quot;_blank\&quot; rel=\&quot;nofollow noopener noreferrer\&quot;&gt;Transfer webhooks&lt;\/a&gt; instead.&lt;\/p&gt;&quot;},{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;You can now subscribe to the new  &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/transfer-webhooks\/latest\/overview\&quot; class=\&quot; external-link no-image\&quot; target=\&quot;_blank\&quot; rel=\&quot;nofollow noopener noreferrer\&quot;&gt;Transfer webhooks&lt;\/a&gt; in your . The new webhooks are triggered by all transfer events, including payments, &lt;a href=\&quot;\/platforms\/payout-to-users\/payout-webhooks\&quot;&gt;payouts&lt;\/a&gt;, &lt;a href=\&quot;\/platforms\/internal-fund-transfers\/internal-transfer-webhooks\&quot;&gt;internal transfers&lt;\/a&gt;, &lt;a href=\&quot;\/business-accounts\/third-party-transfer-webhooks\/\&quot;&gt;transfers to third-party bank accounts&lt;\/a&gt;, and &lt;a href=\&quot;\/issuing\/webhook-types\/payment-events\&quot;&gt;payments with an Adyen-issued card&lt;\/a&gt;.&lt;\/p&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;webhooks&quot;,&quot;category&quot;:&quot;webhooks&quot;},{&quot;id&quot;:&quot;2023-02-20-qwerty&quot;,&quot;title&quot;:&quot;Webhooks&quot;,&quot;release_date&quot;:&quot;2023-02-20&quot;,&quot;date&quot;:1676847600000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=webhooks&amp;utm_source=rss_feed#releaseNote=2023-02-20-webhooks&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/paper-plane.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;webhooks&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;Added two new webhooks &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/balanceplatform-webhooks\/1\/post\/balancePlatform.cardorder.created\&quot; class=\&quot;codeLabel\&quot;&gt;cardorder.created&lt;\/a&gt; and &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/balanceplatform-webhooks\/1\/post\/balancePlatform.cardorder.updated\&quot; class=\&quot;codeLabel\&quot;&gt;cardorder.updated&lt;\/a&gt; to indicate the successful creation or an update to a card order after you &lt;a href=\&quot;https:\/\/docs.adyen.com\/issuing\/create-cards?tab=physical_1\&quot;&gt;create a physical card&lt;\/a&gt;.&lt;\/p&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;webhooks&quot;,&quot;category&quot;:&quot;webhooks&quot;},{&quot;id&quot;:&quot;2023-02-20&quot;,&quot;title&quot;:&quot;Configuration API&quot;,&quot;release_date&quot;:&quot;2023-02-20&quot;,&quot;date&quot;:1676847600000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=balance_platform_configuration_api&amp;utm_source=rss_feed#releaseNote=2023-02-20-configuration-api&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/code.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;balance_platform_configuration_api&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;improved&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;&lt;strong&gt;Transaction rules&lt;\/strong&gt;&lt;br \/&gt;\nRefined logic behind the &lt;a href=\&quot;\/issuing\/authorisation\/transaction-rules#rule-types\&quot;&gt;maximum usage&lt;\/a&gt; rule. If a transaction is declined due to other reasons, for example relayed authorisation decline, the &lt;code&gt;maxUsage&lt;\/code&gt; limit will not be triggered and the card can still be used.&lt;\/p&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;balance_platform_configuration_api&quot;,&quot;category&quot;:&quot;balance_platform_configuration_api&quot;},{&quot;id&quot;:&quot;2023-02-13-ytrewq&quot;,&quot;title&quot;:&quot;Configuration API&quot;,&quot;release_date&quot;:&quot;2023-02-13&quot;,&quot;date&quot;:1676242800000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=balance_platform_configuration_api&amp;utm_source=rss_feed#releaseNote=2023-02-13-configuration-api&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/code.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;balance_platform_configuration_api&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;&lt;strong&gt;Network tokens&lt;\/strong&gt;&lt;br \/&gt;\nYou can now receive webhooks when a cardholder creates a new network token. For example, when they &lt;a href=\&quot;\/issuing\/digital-wallets#add-to-wallet\&quot;&gt;add their Adyen-issued card to a digital wallet&lt;\/a&gt;. You can also receive webhooks upon any &lt;a href=\&quot;\/issuing\/manage-network-tokens#update-token-status\&quot;&gt;network token status update&lt;\/a&gt;.&lt;\/p&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;balance_platform_configuration_api&quot;,&quot;category&quot;:&quot;balance_platform_configuration_api&quot;},{&quot;id&quot;:&quot;2023-02-13-qwerty&quot;,&quot;title&quot;:&quot;Webhooks&quot;,&quot;release_date&quot;:&quot;2023-02-13&quot;,&quot;date&quot;:1676242800000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=webhooks&amp;utm_source=rss_feed#releaseNote=2023-02-13-webhooks&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/paper-plane.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;webhooks&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;improved&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;&lt;strong&gt;Relayed authorisation&lt;\/strong&gt;&lt;br \/&gt;\nAdded HMAC validation logic to the &lt;a href=\&quot;\/issuing\/authorisation\/relayed-authorisation\&quot;&gt;relayed authorisation&lt;\/a&gt; webhook. You can now &lt;a href=\&quot;\/issuing\/set-up-webhooks#validate-hmac\&quot;&gt;verify the HMAC signature&lt;\/a&gt; to add an extra layer of security.&lt;\/p&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;webhooks&quot;,&quot;category&quot;:&quot;webhooks&quot;},{&quot;id&quot;:&quot;2023-02-13-hgfdss&quot;,&quot;title&quot;:&quot;Configuration API&quot;,&quot;release_date&quot;:&quot;2023-02-13&quot;,&quot;date&quot;:1676242800000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=balance_platform_configuration_api&amp;utm_source=rss_feed#releaseNote=2023-02-13-configuration-api&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/code.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;balance_platform_configuration_api&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;&lt;strong&gt;Payment instruments&lt;\/strong&gt;&lt;br \/&gt;\nYou can now get raw details of a virtual card by using GET &lt;code&gt;\/paymentInstruments\/{id}\/reveal&lt;\/code&gt;. Your &lt;a href=\&quot;\/issuing\/manage-access\/api-credentials-web-service\&quot;&gt;API credential&lt;\/a&gt; must have the &lt;strong&gt;Balance Platform BCL PCI role&lt;\/strong&gt;.&lt;\/p&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;balance_platform_configuration_api&quot;,&quot;category&quot;:&quot;balance_platform_configuration_api&quot;},{&quot;id&quot;:&quot;2023-02-13-hgfdsa&quot;,&quot;title&quot;:&quot;Webhooks&quot;,&quot;release_date&quot;:&quot;2023-02-13&quot;,&quot;date&quot;:1676242800000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=webhooks&amp;utm_source=rss_feed#releaseNote=2023-02-13-webhooks&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/paper-plane.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;webhooks&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;&lt;strong&gt;Transfer webhooks&lt;\/strong&gt;&lt;br \/&gt;\nAdded &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/transfer-webhooks\/3\/post\/balancePlatform.transfer.updated#request-data-events-transactionId\&quot; class=\&quot;codeLabel\&quot;&gt;transactionId&lt;\/a&gt; to the applicable item in the &lt;code&gt;events&lt;\/code&gt; array.&lt;\/p&gt;&quot;},{&quot;type&quot;:&quot;deprecated&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;&lt;strong&gt;Transfer webhooks&lt;\/strong&gt;&lt;br \/&gt;\nDeprecated &lt;code&gt;transactionId&lt;\/code&gt; in the root level of the &lt;code&gt;data&lt;\/code&gt; object. Use &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/transfer-webhooks\/latest\/post\/balancePlatform.transfer.updated#request-data-events-transactionId\&quot; class=\&quot;codeLabel\&quot;&gt;transactionId&lt;\/a&gt; from the &lt;code&gt;events&lt;\/code&gt; array instead.&lt;\/p&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;webhooks&quot;,&quot;category&quot;:&quot;webhooks&quot;},{&quot;id&quot;:&quot;2023-02-13-cdfhg&quot;,&quot;title&quot;:&quot;Legal Entity Management API&quot;,&quot;release_date&quot;:&quot;2023-02-13&quot;,&quot;date&quot;:1676242800000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;3&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=legal_entity_api&amp;version=3&amp;utm_source=rss_feed#releaseNote=2023-02-13-legal-entity-management-api-3&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/code.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;legal_entity_api&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;breaking_changes&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;&lt;strong&gt;Transfer instruments&lt;\/strong&gt;&lt;br \/&gt;\nWhen creating a transfer instrument, an &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/3\/post\/transferInstruments#request-bankAccount-accountIdentification\&quot; class=\&quot;codeLabel\&quot;&gt;accountIdentification&lt;\/a&gt; object is now required. This new object comes with a type, which is based on the country of the user\u2019s bank account. Use the type to determine the required fields for every country. For example, for a US bank account, set the &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/3\/post\/transferInstruments#request-bankAccount-accountIdentification-USLocalAccountIdentification-type\&quot; class=\&quot;codeLabel\&quot;&gt;type&lt;\/a&gt; to &lt;strong&gt;usLocal&lt;\/strong&gt;. When the type is &lt;strong&gt;usLocal&lt;\/strong&gt;, the fields &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/3\/post\/transferInstruments#request-bankAccount-accountIdentification-USLocalAccountIdentification-accountNumber\&quot; class=\&quot;codeLabel\&quot;&gt;accountNumber&lt;\/a&gt; and &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/3\/post\/transferInstruments#request-bankAccount-accountIdentification-USLocalAccountIdentification-routingNumber\&quot; class=\&quot;codeLabel\&quot;&gt;routingNumber&lt;\/a&gt; are required. For UK bank accounts, the &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/3\/post\/transferInstruments#request-bankAccount-accountIdentification-UKLocalAccountIdentification-type\&quot; class=\&quot;codeLabel\&quot;&gt;type&lt;\/a&gt; is &lt;strong&gt;ukLocal&lt;\/strong&gt; and the required fields are &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/3\/post\/transferInstruments#request-bankAccount-accountIdentification-UKLocalAccountIdentification-accountNumber\&quot; class=\&quot;codeLabel\&quot;&gt;accountNumber&lt;\/a&gt; and &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/3\/post\/transferInstruments#request-bankAccount-accountIdentification-UKLocalAccountIdentification-sortCode\&quot; class=\&quot;codeLabel\&quot;&gt;sortCode&lt;\/a&gt;. This new object is inside the &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/3\/post\/transferInstruments#request-bankAccount\&quot; class=\&quot;codeLabel\&quot;&gt;bankAccount&lt;\/a&gt; object.&lt;\/p&gt;\n&lt;p&gt;&lt;strong&gt;Legal entities&lt;\/strong&gt;&lt;br \/&gt;\nIn the responses for POST, PATCH, and GET, we separated the status of capabilities from the problems that you need to resolve. We also grouped together the problems per type of capability.&lt;\/p&gt;\n&lt;ul&gt;\n&lt;li&gt;The &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/3\/post\/legalEntities#responses-200-problems\&quot; class=\&quot;codeLabel\&quot;&gt;problems&lt;\/a&gt; array is now at the root level of the response body, and it contains &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/3\/post\/legalEntities#responses-200-problems-verificationErrors\&quot; class=\&quot;codeLabel\&quot;&gt;verificationErrors&lt;\/a&gt; and a list of &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/3\/post\/legalEntities#responses-200-problems-verificationErrors-capabilities\&quot; class=\&quot;codeLabel\&quot;&gt;capabilities&lt;\/a&gt; to which those errors apply.&lt;\/li&gt;\n&lt;li&gt;The &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/3\/post\/legalEntities#responses-200-problems-verificationErrors-capabilities\&quot; class=\&quot;codeLabel\&quot;&gt;capabilities&lt;\/a&gt; key-value object only shows the status of the capability. It no longer contains the &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/3\/post\/legalEntities#responses-200-problems\&quot; class=\&quot;codeLabel\&quot;&gt;problems&lt;\/a&gt; and &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/3\/post\/legalEntities#responses-200-problems-verificationErrors\&quot; class=\&quot;codeLabel\&quot;&gt;verificationErrors&lt;\/a&gt; arrays. &lt;\/li&gt;\n&lt;\/ul&gt;\n&lt;p&gt;&lt;strong&gt;Business lines&lt;\/strong&gt;&lt;br \/&gt;\nThe &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/3\/post\/businessLines#request-service\&quot; class=\&quot;codeLabel\&quot;&gt;service&lt;\/a&gt; field replaces the &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/3\/post\/businessLines#request-capability\&quot; class=\&quot;codeLabel\&quot;&gt;capability&lt;\/a&gt; field. The &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/3\/post\/businessLines#request-capability\&quot; class=\&quot;codeLabel\&quot;&gt;capability&lt;\/a&gt; field is now deprecated.&lt;\/p&gt;&quot;},{&quot;type&quot;:&quot;improved&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;&lt;strong&gt;Transfer instruments&lt;\/strong&gt;&lt;br \/&gt;\nThe capability &lt;strong&gt;sendToTransferInstrument&lt;\/strong&gt; is now requested and allowed on the transfer instrument level. The capability was previously requested on the legal entity level, which prevented payouts for users with multiple bank accounts that were not all verified. The &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/3\/post\/transferInstruments#responses-200-capabilities-verificationStatus\&quot; class=\&quot;codeLabel\&quot;&gt;verificationStatus&lt;\/a&gt; of the capability and any &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/3\/post\/transferInstruments#responses-200-problems-verificationErrors\&quot; class=\&quot;codeLabel\&quot;&gt;verfificationErrors&lt;\/a&gt; are returned in the &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/3\/post\/transferInstruments#responses-200\&quot; class=\&quot;codeLabel\&quot;&gt;\/transferInstruments&lt;\/a&gt; response.&lt;\/p&gt;&quot;},{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;&lt;strong&gt;Legal entities&lt;\/strong&gt;&lt;br \/&gt;\nThe new endpoint &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/3\/post\/legalEntities\/_id_\/checkVerificationErrors\&quot; class=\&quot;codeLabel\&quot;&gt;\/legalEntities\/{id}\/checkVerificationErrors&lt;\/a&gt; returns only the &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/3\/post\/legalEntities\/_id_\/checkVerificationErrors#responses-200-problems-verificationErrors\&quot; class=\&quot;codeLabel\&quot;&gt;verificationErrors&lt;\/a&gt; for a legal entity in the response without any additional details.&lt;\/p&gt;\n&lt;p&gt;&lt;strong&gt;Business lines&lt;\/strong&gt;&lt;br \/&gt;\nThe &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/3\/post\/businessLines#request-webData-webAddress\&quot; class=\&quot;codeLabel\&quot;&gt;webAddress&lt;\/a&gt; field now also has its own unique identifier &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/3\/post\/businessLines#responses-200-webData-webAddressId\&quot; class=\&quot;codeLabel\&quot;&gt;webAddressId&lt;\/a&gt; in order to separately regulate web addresses.&lt;\/p&gt;&quot;},{&quot;type&quot;:&quot;deprecated&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;&lt;strong&gt;Business lines&lt;\/strong&gt;&lt;br \/&gt;\nThe &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/3\/post\/businessLines#request-capability\&quot; class=\&quot;codeLabel\&quot;&gt;capability&lt;\/a&gt; field is deprecated and has been replaced by &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/3\/post\/businessLines#request-service\&quot; class=\&quot;codeLabel\&quot;&gt;service&lt;\/a&gt;. Possible values for &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/3\/post\/businessLines#request-service\&quot; class=\&quot;codeLabel\&quot;&gt;service&lt;\/a&gt;:&lt;\/p&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;paymentProcessing&lt;\/strong&gt;: corresponds to capability &lt;strong&gt;receivePayments&lt;\/strong&gt;.&lt;\/li&gt;\n&lt;li&gt;&lt;strong&gt;banking&lt;\/strong&gt;: corresponds to capability &lt;strong&gt;issueBankAccount&lt;\/strong&gt;.&lt;\/li&gt;\n&lt;li&gt;&lt;strong&gt;issuing&lt;\/strong&gt;: corresponds to capability &lt;strong&gt;issueCard&lt;\/strong&gt;.&lt;\/li&gt;\n&lt;\/ul&gt;&quot;},{&quot;type&quot;:&quot;known_issues&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;Currently, hosted onboarding is not supported in v3. Use v2 for all Legal Entity Management API requests.&lt;\/p&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;legal_entity_api&quot;,&quot;category&quot;:&quot;legal_entity_api&quot;},{&quot;id&quot;:&quot;2023-02-13&quot;,&quot;title&quot;:&quot;Balance Platform Customer Area&quot;,&quot;release_date&quot;:&quot;2023-02-13&quot;,&quot;date&quot;:1676242800000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=balance_platform_app&amp;utm_source=rss_feed#releaseNote=2023-02-13-balance-platform-customer-area&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/browser-customer-area-ca.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;balance_platform_app&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;removed&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot egory&quot;:&quot;checkout_api&quot;},{&quot;id&quot;:&quot;2023-03-13-qwerty&quot;,&quot;title&quot;:&quot;Transfers API&quot;,&quot;release_date&quot;:&quot;2023-02-06&quot;,&quot;date&quot;:1675638000000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;3&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=transfers_api&amp;version=3&amp;utm_source=rss_feed#releaseNote=2023-02-06-transfers-api-3&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/code.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;transfers_api&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;Added transfer &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/transfer-webhooks\/3\/post\/balancePlatform.transfer.created#request-data-priority\&quot; class=\&quot;codeLabel\&quot;&gt;priority&lt;\/a&gt; in Transfer webhooks.&lt;\/p&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;transfers_api&quot;,&quot;category&quot;:&quot;transfers_api&quot;},{&quot;id&quot;:&quot;2023-03-09-upbg1&quot;,&quot;title&quot;:&quot;Hosted onboarding&quot;,&quot;release_date&quot;:&quot;2023-02-06&quot;,&quot;date&quot;:1675638000000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=hop&amp;utm_source=rss_feed#releaseNote=2023-02-06-hosted-onboarding&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/automatic-onboarding.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;hop&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;improved&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;Users in the United States now only need to provide the last four digits of their social security number (SSN).&lt;\/p&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;hop&quot;,&quot;category&quot;:&quot;hop&quot;},{&quot;id&quot;:&quot;2023-02-06-asdfgh&quot;,&quot;title&quot;:&quot;Configuration API&quot;,&quot;release_date&quot;:&quot;2023-02-06&quot;,&quot;date&quot;:1675638000000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=balance_platform_configuration_api&amp;utm_source=rss_feed#releaseNote=2023-02-06-configuration-api&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/code.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;balance_platform_configuration_api&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;&lt;strong&gt;Payment instruments&lt;\/strong&gt;&lt;br \/&gt;\nYou can now create bank accounts in the US. Use POST &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/balanceplatform\/latest\/post\/paymentInstruments\&quot; class=\&quot;codeLabel\&quot;&gt;\/paymentInstruments&lt;\/a&gt; with &lt;code&gt;issuingCountryCode&lt;\/code&gt; &lt;strong&gt;US&lt;\/strong&gt;.&lt;\/p&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;balance_platform_configuration_api&quot;,&quot;category&quot;:&quot;balance_platform_configuration_api&quot;},{&quot;id&quot;:&quot;2023-02-06&quot;,&quot;title&quot;:&quot;Balance Platform Customer Area&quot;,&quot;release_date&quot;:&quot;2023-02-06&quot;,&quot;date&quot;:1675638000000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=balance_platform_app&amp;utm_source=rss_feed#releaseNote=2023-02-06-balance-platform-customer-area&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/browser-customer-area-ca.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;balance_platform_app&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;ul&gt;\n&lt;li&gt;You can now &lt;a href=\&quot;\/platforms\/payout-to-users\&quot;&gt;transfer funds&lt;\/a&gt; to balance accounts or transfer instruments by selecting &lt;strong&gt;Transfers&lt;\/strong&gt; &amp;gt; &lt;strong&gt;Transfer funds&lt;\/strong&gt; or &lt;strong&gt;Balance account details&lt;\/strong&gt; &amp;gt; &lt;strong&gt;Transfer funds&lt;\/strong&gt;.&lt;br \/&gt;\nThis feature is in &lt;em&gt;pilot phase&lt;\/em&gt;. Reach out to your Adyen contact if you are interested in testing it.&lt;\/li&gt;\n&lt;li&gt;We created two new &lt;a href=\&quot;\/platforms\/manage-access\/user-roles\&quot;&gt;user roles&lt;\/a&gt;:\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Balance Platform Merchant Balance Sweep Configuration role:&lt;\/strong&gt; Enables you to configure sweeps (automatic transfers of funds).&lt;\/li&gt;\n&lt;li&gt;&lt;strong&gt;Balance Platform Initiate Transfer Role:&lt;\/strong&gt; Enables you to manually transfer funds.&lt;\/li&gt;\n&lt;\/ul&gt;&lt;\/li&gt;\n&lt;\/ul&gt;&quot;},{&quot;type&quot;:&quot;improved&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;The following only apply to users working with &lt;a href=\&quot;https:\/\/docs.adyen.com\/issuing\&quot;&gt;Adyen Issuing&lt;\/a&gt;.&lt;\/p&gt;\n&lt;ul&gt;\n&lt;li&gt;In &lt;strong&gt;Card orders&lt;\/strong&gt; &amp;gt; &lt;strong&gt;Card order items&lt;\/strong&gt;, you can now see the &lt;strong&gt;Description&lt;\/strong&gt; and &lt;strong&gt;Reference&lt;\/strong&gt; of a payment instrument.&lt;\/li&gt;\n&lt;li&gt;In the &lt;strong&gt;Transfers&lt;\/strong&gt; page, you can now apply an &lt;strong&gt;MCC&lt;\/strong&gt; filter and a &lt;strong&gt;Processing type&lt;\/strong&gt; filter.&lt;\/li&gt;\n&lt;\/ul&gt;&quot;},{&quot;type&quot;:&quot;fixed&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;In the &lt;strong&gt;Sweep configuration&lt;\/strong&gt; details, the &lt;strong&gt;Description&lt;\/strong&gt; field is visible again.&lt;\/p&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;balance_platform_app&quot;,&quot;category&quot;:&quot;balance_platform_app&quot;},{&quot;id&quot;:&quot;2022-02-06&quot;,&quot;title&quot;:&quot;Legal Entity Management API&quot;,&quot;release_date&quot;:&quot;2023-02-06&quot;,&quot;date&quot;:1675638000000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=legal_entity_api&amp;utm_source=rss_feed#releaseNote=2023-02-06-legal-entity-management-api&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/code.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;legal_entity_api&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;Added a &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/2\/post\/legalEntities\/_id_\/onboardingLinks#request-settings\&quot; docs.adyen.com\/api-explorer\#\/legalentity\/v2\/post\/legalEntities__reqParam_organization-taxInformation\&quot; class=\&quot;codeLabel\&quot;&gt;taxInformation&lt;\/a&gt; object and the  &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/2\/post\/legalEntities#request-organization-vatNumber\&quot; class=\&quot;codeLabel  external-link no-image\&quot; target=\&quot;_blank\&quot; rel=\&quot;nofollow noopener noreferrer\&quot;&gt;vatNumber&lt;\/a&gt; field replace the &lt;code&gt;taxId&lt;\/code&gt; field. The &lt;code&gt;taxId&lt;\/code&gt; field is now removed. This means that for the countries where you collect the VAT number, you must now send it in the &lt;code&gt;vatNumber&lt;\/code&gt; field. In the countries where there are no VAT systems or for additional financial products that require tax IDs, you must now send the information in the &lt;code&gt;taxInformation&lt;\/code&gt; object.&lt;\/li&gt;\n&lt;li&gt;The  &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/2\/post\/legalEntities#request-organization-vatAbsenceReason\&quot; class=\&quot;codeLabel  external-link no-image\&quot; target=\&quot;_blank\&quot; rel=\&quot;nofollow noopener noreferrer\&quot;&gt;vatAbsenceReason&lt;\/a&gt; field replaces the &lt;code&gt;taxIdAbsenceReason&lt;\/code&gt; field. The &lt;code&gt;taxIdAbsenceReason&lt;\/code&gt; field is now removed.&lt;\/li&gt;\n&lt;li&gt;The &lt;code&gt;phone.countryCode&lt;\/code&gt; field is now removed. Provide the full phone number, including the country code, in the &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\#\/legalentity\/v2\/post\/legalEntities__reqParam_organization-phone-number\&quot; class=\&quot;codeLabel\&quot;&gt;number&lt;\/a&gt; field. For example, &lt;strong&gt;+31123456789&lt;\/strong&gt;.&lt;\/li&gt;\n&lt;li&gt;There is a new  &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/2\/post\/legalEntities#responses-200-documentDetails\&quot; class=\&quot;codeLabel  external-link no-image\&quot; target=\&quot;_blank\&quot; rel=\&quot;nofollow noopener noreferrer\&quot;&gt;documentDetails&lt;\/a&gt; object in the response. This object contains the list of documents uploaded for the legal entity.&lt;\/li&gt;\n&lt;\/ul&gt;\n&lt;p&gt;&lt;strong&gt;Documents&lt;\/strong&gt;&lt;\/p&gt;\n&lt;ul&gt;\n&lt;li&gt;When uploading a document, the document  &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/2\/post\/documents#request-type\&quot; class=\&quot;codeLabel  external-link no-image\&quot; target=\&quot;_blank\&quot; rel=\&quot;nofollow noopener noreferrer\&quot;&gt;type&lt;\/a&gt; &lt;strong&gt;vatDocument&lt;\/strong&gt; and &lt;strong&gt;proofOfOrganizationTaxInfo&lt;\/strong&gt; replaces &lt;strong&gt;taxDocument&lt;\/strong&gt;. The &lt;strong&gt;taxDocument&lt;\/strong&gt; value is now removed. See &lt;a href=\&quot;\/platforms\/verification-requirements\/document-requirements#vat-document\&quot;&gt;document requirements&lt;\/a&gt;.&lt;\/li&gt;\n&lt;\/ul&gt;&quot;},{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;&lt;strong&gt;Legal entities&lt;\/strong&gt;&lt;\/p&gt;\n&lt;ul&gt;\n&lt;li&gt;You can now onboard &lt;a href=\&quot;\/platforms\/verification-overview?tab=sole_proprietorship_3\&quot;&gt;sole proprietors&lt;\/a&gt; (Belgium, Germany, Netherlands, and the UK) to your platform. For more information, see &lt;a href=\&quot;\/platforms\/onboard-users\&quot;&gt;Onboard and verify your users&lt;\/a&gt;.&lt;\/li&gt;\n&lt;li&gt;The &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\#\/legalentity\/v2\/post\/legalEntities__reqParam_organization-taxReportingClassification\&quot; class=\&quot;codeLabel\&quot;&gt;taxReportingClassification&lt;\/a&gt; object was added so you can send your user&#039;s Foreign Account Tax Compliance Act (FATCA)\/Common Reporting Standard (CRS) classification. This information is required in the &lt;a href=\&quot;\/platforms\/verification-requirements?tab=business-accounts_1\&quot;&gt;verification checks for business accounts&lt;\/a&gt;.&lt;\/li&gt;\n&lt;li&gt;The  &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/2\/post\/legalEntities#request-organization-vatNumber\&quot; class=\&quot;codeLabel  external-link no-image\&quot; target=\&quot;_blank\&quot; rel=\&quot;nofollow noopener noreferrer\&quot;&gt;vatNumber&lt;\/a&gt; field was added for the following legal entity types: &lt;code&gt;organization&lt;\/code&gt; and &lt;code&gt;soleProprietorship&lt;\/code&gt;. This information is required in the &lt;a href=\&quot;\/platforms\/verification-requirements?tab=issuing_2\&quot;&gt;verification checks for card issuing&lt;\/a&gt;.&lt;\/li&gt;\n&lt;li&gt;&lt;strong&gt;US only&lt;\/strong&gt;: In addition to the full 9-digit SSN, you can now also send the last 4 digits of an SSN in the &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\#\/legalentity\/v2\/post\/legalEntities__reqParam_individual-identificationData-number\&quot; class=\&quot;codeLabel\&quot;&gt;identificationData.number&lt;\/a&gt; field.&lt;\/li&gt;\n&lt;\/ul&gt;\n&lt;p&gt;&lt;strong&gt;Documents&lt;\/strong&gt;&lt;\/p&gt;\n&lt;ul&gt;\n&lt;li&gt;The &lt;code&gt;attachments&lt;\/code&gt; object has a new &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\#\/legalentity\/v2\/post\/documents__reqParam_attachments-pageName\&quot; class=\&quot;codeLabel\&quot;&gt;pageName&lt;\/a&gt; field that contains the name of the file including the file extension.&lt;\/li&gt;\n&lt;\/ul&gt;&quot;},{&quot;type&quot;:&quot;deprecated&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;&lt;strong&gt;Transfer instruments&lt;\/strong&gt;&lt;\/p&gt;\n&lt;ul&gt;\n&lt;li&gt;The &lt;code&gt;bankAccount.accountType&lt;\/code&gt; field was not needed for bank accounts held in the US. This field is now deprecated.&lt;\/li&gt;\n&lt;\/ul&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;leg tform_app&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;fixed&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;ul&gt;\n&lt;li&gt;We added back the &lt;strong&gt;Merchant&lt;\/strong&gt; &amp;gt; &lt;strong&gt;Category code&lt;\/strong&gt; description to the &lt;strong&gt;Payment details&lt;\/strong&gt; page.&lt;\/li&gt;\n&lt;li&gt;The &lt;strong&gt;Account holder details&lt;\/strong&gt; page now shows the legal entity details regardless of the scope in which it was created.&lt;\/li&gt;\n&lt;\/ul&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;balance_platform_app&quot;,&quot;category&quot;:&quot;balance_platform_app&quot;},{&quot;id&quot;:&quot;2022-04-14-5tv3t&quot;,&quot;title&quot;:&quot;Configuration API&quot;,&quot;release_date&quot;:&quot;2022-04-11&quot;,&quot;date&quot;:1649628000000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;2&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=balance_platform_configuration_api&amp;version=2&amp;utm_source=rss_feed#releaseNote=2022-04-11-configuration-api-2&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/code.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;balance_platform_configuration_api&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;&lt;strong&gt;Transaction rules&lt;\/strong&gt;&lt;\/p&gt;\n&lt;ul&gt;\n&lt;li&gt;You can now define a &lt;a href=\&quot;\/issuing\/authorisation\/transaction-rules#outcome\&quot;&gt;scored-based outcome&lt;\/a&gt; where you assign a positive or negative score to a transaction instead of immediately blocking it.&lt;\/li&gt;\n&lt;li&gt;When defining &lt;a href=\&quot;\/issuing\/authorisation\/transaction-rules#time-intervals\&quot;&gt;time intervals&lt;\/a&gt;, you can now use the following types:\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;rolling&lt;\/strong&gt; interval: you can define a custom reset date, time, timezone, and duration.&lt;\/li&gt;\n&lt;li&gt;&lt;strong&gt;sliding&lt;\/strong&gt; interval: you can set a duration and the conditions will be evaluated up to the current time.&lt;\/li&gt;\n&lt;\/ul&gt;&lt;\/li&gt;\n&lt;\/ul&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;balance_platform_configuration_api&quot;,&quot;category&quot;:&quot;balance_platform_configuration_api&quot;},{&quot;id&quot;:&quot;2022-03-30-0wpfe&quot;,&quot;title&quot;:&quot;Balance Platform Customer Area&quot;,&quot;release_date&quot;:&quot;2022-03-28&quot;,&quot;date&quot;:1648418400000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=balance_platform_app&amp;utm_source=rss_feed#releaseNote=2022-03-28-balance-platform-customer-area&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/browser-customer-area-ca.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;balance_platform_app&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;You can now view the details of the legal entities linked to an account holder in the new &lt;strong&gt;Entity associations&lt;\/strong&gt; section of the &lt;strong&gt;Account holder details&lt;\/strong&gt; page.&lt;\/p&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;balance_platform_app&quot;,&quot;category&quot;:&quot;balance_platform_app&quot;},{&quot;id&quot;:&quot;2022-03-21-41qwn&quot;,&quot;title&quot;:&quot;Transfers API&quot;,&quot;release_date&quot;:&quot;2022-03-21&quot;,&quot;date&quot;:1647817200000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;3&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=transfers_api&amp;version=3&amp;utm_source=rss_feed#releaseNote=2022-03-21-transfers-api-3&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/code.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;transfers_api&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;breaking_changes&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;ul&gt;\n&lt;li&gt;Each request must now have a &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\#\/transfers\/v3\/post\/transfers__reqParam_category\&quot; class=\&quot;codeLabel\&quot;&gt;category&lt;\/a&gt;. This field indicates the type of transfer: &lt;strong&gt;internal&lt;\/strong&gt; for transfers to another balance account, or &lt;strong&gt;bank&lt;\/strong&gt; for transfers to a transfer instrument or a third-party bank account.&lt;\/li&gt;\n&lt;li&gt;The  &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/transfers\/3\/post\/transfers#request-priority\&quot; class=\&quot;codeLabel  external-link no-image\&quot; target=\&quot;_blank\&quot; rel=\&quot;nofollow noopener noreferrer\&quot;&gt;priority&lt;\/a&gt; field is now required for all transfers with &lt;code&gt;category&lt;\/code&gt; &lt;strong&gt;bank&lt;\/strong&gt;. The priority affects the speed of the transfer and the fees that you have to pay. Possible values are &lt;strong&gt;regular&lt;\/strong&gt;, &lt;strong&gt;fast&lt;\/strong&gt;, or &lt;strong&gt;wire&lt;\/strong&gt;.&lt;\/li&gt;\n&lt;\/ul&gt;&quot;},{&quot;type&quot;:&quot;removed&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;Removed the &lt;code&gt;bank&lt;\/code&gt; object which used to contain the &lt;code&gt;priority&lt;\/code&gt; field. The &lt;code&gt;priority&lt;\/code&gt; field is now at the root level.&lt;\/p&gt;&quot;},{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;ul&gt;\n&lt;li&gt;In addition to IBAN bank accounts, we now support transfers to &lt;a href=\&quot;\/business-accounts\/send-funds\&quot;&gt;third-party bank accounts&lt;\/a&gt; in more countries and currencies. For more information, reach out to your Adyen contact.&lt;\/li&gt;\n&lt;li&gt;The account holder details and bank account details are now in separate objects inside the &lt;code&gt;counterparty.bankAccount&lt;\/code&gt; object.\n&lt;ul&gt;\n&lt;li&gt;&lt;code&gt;accountHolder&lt;\/code&gt;: Contains the details about the owner of the bank account, including their name and address.&lt;\/li&gt;\n&lt;li&gt;&lt;code&gt;accountIdentification&lt;\/code&gt;: Contains the details of the bank account. &lt;\/li&gt;\n&lt;\/ul&gt;&lt;\/li&gt;\n&lt;li&gt;\n&lt;p&gt;You can now get the required fields when specifying the details of a third-party bank account based on the &lt;code&gt;counterparty.bankAccount.accountIdentification.type&lt;\/code&gt;.&lt;\/p&gt;\n&lt;p&gt;For example, for a bank account in Czech Republic, your user can provide either an IBAN or an account number. See more &lt;a href=\&quot;\/business-accounts\/send-funds\#bank-account-identification-types\&quot;&gt;examples&lt;\/a&gt;.&lt;\/p&gt;\n&lt;table&gt;\n&lt;thead&gt;\n&lt;tr&gt;\n&lt;th&gt;Czech bank account&lt;\/th&gt;\n&lt;th&gt;&lt;code&gt;accountIdentification.type&lt;\/code&gt;&lt;\/th&gt;\n&lt;th&gt;Required fields&lt;\/th&gt;\n&lt;\/tr&gt;\n&lt;\/thead&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;IBAN&lt;\/td&gt;\n&lt;td&gt;&lt;strong&gt;iban&lt;\/strong&gt;&lt;\/td&gt;\n&lt;td&gt;&lt;code&gt;iban&lt;\/code&gt;&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Account number&lt;\/td&gt;\n&lt;td&gt;&lt;strong&gt;czLocal&lt;\/strong&gt;&lt;\/td&gt;\n&lt;td&gt;&lt;code&gt;accountNumber&lt;\/code&gt;, &lt;code&gt;bankCode&lt;\/code&gt;&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;\/tbody&gt;\n&lt;\/table&gt;\n&lt;\/li&gt;\n&lt;\/ul&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;transfers_api&quot;,&quot;category&quot;:&quot;transfers_api&quot;},{&quot;id&quot;:&quot;2022-03-16-pl8du&quot;,&quot;title&quot;:&quot;General&quot;,&quot;release_date&quot;:&quot;2022-03-14&quot;,&quot;date&quot;:1647212400000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=issuing_general&amp;utm_source=rss_feed#releaseNote=2022-03-14-general&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen-docs\/assets\/icons\/issuing.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;issuing_general&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;Your users can now add Adyen-issued physical cards to &lt;strong&gt;Apple Pay&lt;\/strong&gt; in Germany, the Netherlands, and Poland. To enable this feature, reach out to your Adyen contact.&lt;\/p&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;issuing_general&quot;,&quot;category&quot;:&quot;issuing_general&quot;},{&quot;id&quot;:&quot;2022-02-28-74chx&quot;,&quot;title&quot;:&quot;Balance Platform Customer Area&quot;,&quot;release_date&quot;:&quot;2022-02-28&quot;,&quot;date&quot;:1646002800000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=balance_platform_app&amp;utm_source=rss_feed#releaseNote=2022-02-28-balance-platform-customer-area&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/browser-customer-area-ca.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;balance_platform_app&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;In the payment instrument details page, you can now see the description of the image used to personalize a physical card under &lt;strong&gt;Card order details &amp;gt; Card image&lt;\/strong&gt;.&lt;\/p&gt;\n&lt;\/li&gt;\n&lt;li&gt;\n&lt;p&gt;In the payment instrument details page, the &lt;strong&gt;Batch&lt;\/strong&gt; address listed under &lt;strong&gt;Delivery&lt;\/strong&gt; now shows any address overrides you make when creating physical cards through API requests. If your  &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/balanceplatform\/latest\/post\/paymentInstruments\&quot; class=\&quot;codeLabel  external-link no-image\&quot; target=\&quot;_blank\&quot; rel=\&quot;nofollow noopener noreferrer\&quot;&gt;\/paymentInstruments&lt;\/a&gt; request contains a  &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/balanceplatform\/latest\/post\/paymentInstruments#request-card-configuration-bulkAddress\&quot; class=\&quot;codeLabel  external-link no-image\&quot; target=\&quot;_blank\&quot; rel=\&quot;nofollow noopener noreferrer\&quot;&gt;bulkAddress&lt;\/a&gt; override, this address is shown instead. If there are no overrides, the bulk address is shown in the configuration profile.&lt;\/p&gt;\n&lt;\/li&gt;\n&lt;\/ul&gt;&quot;},{&quot;type&quot;:&quot;fixed&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;On the &lt;strong&gt;Payment details&lt;\/strong&gt; page, you can now view the references and descriptions for Account holders, Balance accounts, and Payment instruments.&lt;\/p&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;balance_platform_app&quot;,&quot;category&quot;:&quot;balance_platform_app&quot;},{&quot;id&quot;:&quot;2022-02-21-ybnc8&quot;,&quot;title&quot;:&quot;Balance Platform Customer Area&quot;,&quot;release_date&quot;:&quot;2022-02-21&quot;,&quot;date&quot;:1645398000000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=balance_platform_app&amp;utm_source=rss_feed#releaseNote=2022-02-21-balance-platform-customer-area&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/browser-customer-area-ca.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;balance_platform_app&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;A &lt;strong&gt;Webhooks&lt;\/strong&gt; page is now available for all platforms in the Customer Area. You can create or update &lt;a href=\&quot;\/development-resources\/webhooks\/configure-and-manage\&quot;&gt;webhooks&lt;\/a&gt; to receive notifications about events that occur in the balance platform.&lt;\/p&gt;\n&lt;\/li&gt;\n&lt;li&gt;\n&lt;p&gt;We added a card order details section to payment instrument pages. Select &lt;strong&gt;Payment instruments&lt;\/strong&gt; and then select a payment instrument ID. You can view information such as the card order reference, configuration profile description, and currency.&lt;\/p&gt;\n&lt;\/li&gt;\n&lt;\/ul&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;balance_platform_app&quot;,&quot;category&quot;:&quot;balance_platform_app&quot;},{&quot;id&quot;:&quot;2022-02-17-eblmi&quot;,&quot;title&quot;:&quot;Balance Platform Customer Area&quot;,&quot;release_date&quot;:&quot;2022-02-07&quot;,&quot;date&quot;:1644188400000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=balance_platform_app&amp;utm_source=rss_feed#releaseNote=2022-02-07-balance-platform-customer-area&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/browser-customer-area-ca.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;balance_platform_app&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;We added a new &lt;strong&gt;Card orders&lt;\/strong&gt; page in the Customer Area to provide an overview of all card orders in your platform. You can filter the orders based on their status, the service center handling the order, the profile reference, and the open, end, lock, and close date of the orders.&lt;br \/&gt;\nBy selecting the order reference, you are directed to the &lt;strong&gt;Card order items&lt;\/strong&gt; page, where you can see the details of all the cards including a particular order. The page provides an overview of the cards&#039; order statuses, payment instrument references, card holder names, truncated card numbers, the card expiration dates, types, and statuses, and any possible error messages related to the order items.&lt;\/p&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;balance_platform_app&quot;,&quot;category&quot;:&quot;balance_platform_app&quot;},{&quot;id&quot;:&quot;2022-02-17-eblmg&quot;,&quot;title&quot;:&quot;Reports&quot;,&quot;release_date&quot;:&quot;2022-02-07&quot;,&quot;date&quot;:1644188400000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=reports&amp;utm_source=rss_feed#releaseNote=2022-02-07-reports&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/billing.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;reports&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;deprecated&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;We deprecated the &lt;strong&gt;Balance Platform Payment Accounting Report&lt;\/strong&gt;, and introduced the new &lt;strong&gt;Balance Platform Accounting Report&lt;\/strong&gt;, where you can have an overview of all transaction status changes. You can generate and download the new report from the &lt;strong&gt;Reports&lt;\/strong&gt; page of your Customer Area.&lt;\/p&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;reports&quot;,&quot;category&quot;:&quot;reports&quot;},{&quot;id&quot;:&quot;2022-02-01-x8tmx&quot;,&quot;title&quot;:&quot;Configuration API&quot;,&quot;release_date&quot;:&quot;2022-01-31&quot;,&quot;date&quot;:1643583600000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&lt;p&gt;This change only applies to v1.&lt;\/p&gt;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=balance_platform_configuration_api&amp;utm_source=rss_feed#releaseNote=2022-01-31-configuration-api&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/code.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;balance_platform_configuration_api&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;fixed&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;In the test environment, when you create a transaction rule and link it to a payment instrument, the response now returns the &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\#\/balanceplatform\/v1\/post\/transactionRules__resParam_paymentInstrumentGroupId\&quot; class=\&quot;codeLabel\&quot;&gt;paymentInstrumentId&lt;\/a&gt; as expected.&lt;\/p&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;balance_platform_configuration_api&quot;,&quot;category&quot;:&quot;balance_platform_configuration_api&quot;},{&quot;id&quot;:&quot;2022-01-24-gpwol&quot;,&quot;title&quot;:&quot;Balance Platform Customer Area&quot;,&quot;release_date&quot;:&quot;2022-01-24&quot;,&quot;date&quot;:1642978800000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=balance_platform_app&amp;utm_source=rss_feed#releaseNote=2022-01-24-balance-platform-customer-area&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/browser-customer-area-ca.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;balance_platform_app&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;fixed&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;ul&gt;\n&lt;li&gt;You can now generate the &lt;a href=\&quot;\/issuing\/report-types\/received-payments-report\&quot;&gt;Received Payments Report&lt;\/a&gt; in bulk.&lt;\/li&gt;\n&lt;\/ul&gt;&quot;},{&quot;type&quot;:&quot;improved&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;When viewing payments:&lt;\/p&gt;\n&lt;ul&gt;\n&lt;li&gt;In the &lt;strong&gt;Merchant&lt;\/strong&gt; section, you can now find the &lt;strong&gt;Postal code&lt;\/strong&gt; of the merchant that processed the payment.&lt;\/li&gt;\n&lt;li&gt;In the &lt;strong&gt;Processing information&lt;\/strong&gt; section, you&#039;ll now see the &lt;strong&gt;Processing type&lt;\/strong&gt;. This field shows the type of the transaction, such as if it was an ecommerce or point-of-sale payment, an ATM withdrawal, or a balance inquiry. Previously, this was called &lt;strong&gt;Shopper interaction&lt;\/strong&gt;.&lt;\/li&gt;\n&lt;\/ul&gt;\n&lt;\/li&gt;\n&lt;li&gt;\n&lt;p&gt;When viewing the &lt;a href=\&quot;\/issuing\/add-capabilities\&quot;&gt;capabilities of an account holder&lt;\/a&gt;, you will now see the column name &lt;strong&gt;ENABLED&lt;\/strong&gt; instead of &lt;strong&gt;ACTIVE&lt;\/strong&gt;. We changed the value to match the field that you receive in APIs and webhooks.&lt;\/p&gt;\n&lt;\/li&gt;\n&lt;\/ul&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;balance_platform_app&quot;,&quot;category&quot;:&quot;balance_platform_app&quot;},{&quot;id&quot;:&quot;2021-12-06-kz5un&quot;,&quot;title&quot;:&quot;Configuration API&quot;,&quot;release_date&quot;:&quot;2022-01-24&quot;,&quot;date&quot;:1642978800000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;2&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=balance_platform_configuration_api&amp;version=2&amp;utm_source=rss_feed#releaseNote=2022-01-24-configuration-api-2&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/code.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;balance_platform_configuration_api&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;removed&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;&lt;strong&gt;Balance accounts&lt;\/strong&gt;&lt;\/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Removed the &lt;code&gt;paymentInstruments&lt;\/code&gt; array from the GET &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\#\/balanceplatform\/v1\/get\/balanceAccounts\/{id}\&quot; class=\&quot;codeLabel\&quot;&gt;\/balanceAccounts\/{id}&lt;\/a&gt; response. To get the list of payment instruments for a specific balance account, use the GET  &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/balanceplatform\/2\/get\/balanceAccounts\/(id)\/paymentInstruments\&quot; class=\&quot;codeLabel  external-link no-image\&quot; target=\&quot;_blank\&quot; rel=\&quot;nofollow noopener noreferrer\&quot;&gt;\/balanceAccounts\/{id}\/paymentInstruments&lt;\/a&gt; call.&lt;\/li&gt;\n&lt;li&gt;Removed the &lt;code&gt;sweepConfiguration&lt;\/code&gt; object. This is now replaced by a &lt;strong&gt;sweeps&lt;\/strong&gt; resource. See &lt;em&gt;New&lt;\/em&gt; section below.&lt;\/li&gt;\n&lt;\/ul&gt;\n&lt;p&gt;&lt;strong&gt;Payment instruments&lt;\/strong&gt;&lt;\/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Removed the &lt;code&gt;houseNumberOrName&lt;\/code&gt; and &lt;code&gt;street&lt;\/code&gt; fields from the &lt;code&gt;card.authentication.deliveryContact.address&lt;\/code&gt; object. To specify the street, house number, and other address details, use the new &lt;code&gt;line1&lt;\/code&gt;, &lt;code&gt;line2&lt;\/code&gt;, and &lt;code&gt;line3&lt;\/code&gt; fields.&lt;\/li&gt;\n&lt;\/ul&gt;&quot;},{&quot;type&quot;:&quot;breaking_changes&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;ul&gt;\n&lt;li&gt;&lt;code&gt;requestid&lt;\/code&gt; replaces &lt;code&gt;pspReference&lt;\/code&gt; in all response headers.&lt;\/li&gt;\n&lt;\/ul&gt;\n&lt;p&gt;&lt;strong&gt;Legal entities&lt;\/strong&gt;, &lt;strong&gt;documents&lt;\/strong&gt;, and &lt;strong&gt;transfer instruments&lt;\/strong&gt;&lt;\/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;To prepare for changes in the future, we moved the legal entity and other supporting resources to a different domain: &lt;code&gt;https:\/\/kyc-test.adyen.com\/lem\/&lt;\/code&gt;. The corresponding endpoints have been removed from the Balance Platform Configuration API. &lt;\/p&gt;\n&lt;p&gt;When upgrading to Balance Platform Configuration API v2, make sure to:&lt;\/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Get new API credentials for the  &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/latest\/overview\&quot; class=\&quot; external-link no-image\&quot; target=\&quot;_blank\&quot; rel=\&quot;nofollow noopener noreferrer\&quot;&gt;Legal Entity Management API&lt;\/a&gt; from your Adyen contact.&lt;\/li&gt;\n&lt;li&gt;Update the URLs of your requests for  &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/latest\/post\/legalEntities\&quot; class=\&quot;codeLabel  external-link no-image\&quot; target=\&quot;_blank\&quot; rel=\&quot;nofollow noopener noreferrer\&quot;&gt;legalEntities&lt;\/a&gt;,  &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/legalentity\/latest\/post\/documents\&quot; class=\&quot;codeLabel  external-link no-image\&quot; target=\&quot;_blank\&quot; rel=\&quot;nofollow noopener noreferrer\&quot;&gt;\/documents&lt;\/a&gt;, and &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\#\/legalentity\/latest\/post\/transferInstruments\&quot; class=\&quot;codeLabel\&quot;&gt;transferInstruments&lt;\/a&gt;.&lt;\/li&gt;\n&lt;\/ul&gt;\n&lt;\/li&gt;\n&lt;\/ul&gt;\n&lt;p&gt;&lt;strong&gt;Payment instruments&lt;\/strong&gt;&lt;\/p&gt;\n&lt;ul&gt;\n&lt;li&gt;The list of possible values of the  &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/balanceplatform\/2\/post\/paymentInstruments#request-status\&quot; class=\&quot;codeLabel  external-link no-image\&quot; target=\&quot;_blank\&quot; rel=\&quot;nofollow noopener noreferrer\&quot;&gt;status&lt;\/a&gt; field has been changed, and sending the new &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\#\/balanceplatform\/v2\/post\/paymentInstruments__reqParam_statusReason\&quot; class=\&quot;codeLabel\&quot;&gt;statusReason&lt;\/a&gt; parameter is now required in some cases.&lt;\/li&gt;\n&lt;\/ul&gt;\n&lt;div class=\&quot;sticky-table-container\&quot;&gt;\n    \n&lt;table&gt;\n&lt;thead&gt;\n&lt;tr&gt;\n&lt;th style=\&quot;text-align: left;\&quot;&gt;&lt;code&gt;status&lt;\/code&gt; v1&lt;\/th&gt;\n&lt;th style=\&quot;text-align: left;\&quot;&gt;&lt;code&gt;status&lt;\/code&gt; v2&lt;\/th&gt;\n&lt;th&gt;&lt;code&gt;statusReason&lt;\/code&gt;&lt;\/th&gt;\n&lt;\/tr&gt;\n&lt;\/thead&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;&lt;strong&gt;Active&lt;\/strong&gt;&lt;\/td&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;&lt;strong&gt;active&lt;\/strong&gt;&lt;\/td&gt;\n&lt;td&gt;Optional&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;&lt;strong&gt;Inactive&lt;\/strong&gt;&lt;\/td&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;&lt;strong&gt;inactive&lt;\/strong&gt;&lt;\/td&gt;\n&lt;td&gt;Optional&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;&lt;strong&gt;Requested&lt;\/strong&gt;&lt;\/td&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;&lt;strong&gt;inactive&lt;\/strong&gt;&lt;\/td&gt;\n&lt;td&gt;Optional&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;&lt;strong&gt;Suspended&lt;\/strong&gt;&lt;\/td&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;&lt;strong&gt;suspended&lt;\/strong&gt;&lt;\/td&gt;\n&lt;td&gt;Required&lt;br&gt;See &lt;a href=\&quot;\/issuing\/manage-cards#suspend-card\&quot;&gt;possible values&lt;\/a&gt;&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;&lt;strong&gt;Stolen&lt;\/strong&gt;&lt;\/td&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;&lt;strong&gt;suspended&lt;\/strong&gt;&lt;\/td&gt;\n&lt;td&gt;&lt;strong&gt;stolen&lt;\/strong&gt;&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;&lt;strong&gt;Lost&lt;\/strong&gt;&lt;\/td&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;&lt;strong&gt;suspended&lt;\/strong&gt;&lt;\/td&gt;\n&lt;td&gt;&lt;strong&gt;lost&lt;\/strong&gt;&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;tr&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;&lt;strong&gt;Closed&lt;\/strong&gt;&lt;\/td&gt;\n&lt;td style=\&quot;text-align: left;\&quot;&gt;&lt;strong&gt;closed&lt;\/strong&gt;&lt;\/td&gt;\n&lt;td&gt;Required&lt;br&gt;See &lt;a href=\&quot;\/issuing\/manage-cards#close-card\&quot;&gt;possible values&lt;\/a&gt;&lt;\/td&gt;\n&lt;\/tr&gt;\n&lt;\/tbody&gt;\n&lt;\/table&gt;\n\n&lt;\/div&gt;\n&quot;},{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;&lt;strong&gt;Sweeps&lt;\/strong&gt;&lt;\/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Added new endpoints to create, update, and delete a &lt;strong&gt;sweeps&lt;\/strong&gt; resource, which you can use to set up &lt;a href=\&quot;\/platforms\/payout-to-users#scheduled-payouts\&quot;&gt;scheduled payouts&lt;\/a&gt;.\n&lt;ul&gt;\n&lt;li&gt;POST  &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/balanceplatform\/latest\/post\/balanceAccounts\/(balanceAccountId)\/sweeps\&quot; class=\&quot;codeLabel  external-link no-image\&quot; target=\&quot;_blank\&quot; rel=\&quot;nofollow noopener noreferrer\&quot;&gt;\/balanceAccounts\/{balanceAccountId}\/sweeps&lt;\/a&gt;&lt;\/li&gt;\n&lt;li&gt;PATCH  &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/balanceplatform\/latest\/patch\/balanceAccounts\/(balanceAccountId)\/sweeps\/(sweepId)\&quot; class=\&quot;codeLabel  external-link no-image\&quot; target=\&quot;_blank\&quot; rel=\&quot;nofollow noopener noreferrer\&quot;&gt;\/balanceAccounts\/{balanceAccountId}\/sweeps\/{sweepId}&lt;\/a&gt;&lt;\/li&gt;\n&lt;li&gt;DELETE  &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/balanceplatform\/latest\/delete\/balanceAccounts\/(balanceAccountId)\/sweeps\/(sweepId)\&quot; class=\&quot;codeLabel  external-link no-image\&quot; target=\&quot;_blank\&quot; rel=\&quot;nofollow noopener noreferrer\&quot;&gt;\/balanceAccounts\/{balanceAccountId}\/sweeps\/{sweepId}&lt;\/a&gt;&lt;\/li&gt;\n&lt;li&gt;GET  &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/balanceplatform\/latest\/get\/balanceAccounts\/(balanceAccountId)\/sweeps\&quot; class=\&quot;codeLabel  external-link no-image\&quot; target=\&quot;_blank\&quot; rel=\&quot;nofollow noopener noreferrer\&quot;&gt;\/balanceAccounts\/{balanceAccountId}\/sweeps&lt;\/a&gt;&lt;\/li&gt;\n&lt;li&gt;GET  &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/balanceplatform\/latest\/get\/balanceAccounts\/(balanceAccountId)\/sweeps\/(sweepId)\&quot; class=\&quot;codeLabel  external-link no-image\&quot; target=\&quot;_blank\&quot; rel=\&quot;nofollow noopener noreferrer\&quot;&gt;\/balanceAccounts\/{balanceAccountId}\/sweeps\/{sweepId}&lt;\/a&gt;&lt;\/li&gt;\n&lt;\/ul&gt;&lt;\/li&gt;\n&lt;\/ul&gt;\n&lt;p&gt;&lt;strong&gt;Payment instruments&lt;\/strong&gt;&lt;\/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Added a &lt;code&gt;statusReason&lt;\/code&gt; field to provide additional information for the status change of the payment instrument. Its possible values are: &lt;strong&gt;accountClosure&lt;\/strong&gt;, &lt;strong&gt;damaged&lt;\/strong&gt;, &lt;strong&gt;endOfLife&lt;\/strong&gt;, &lt;strong&gt;expired&lt;\/strong&gt;, &lt;strong&gt;lost&lt;\/strong&gt;, &lt;strong&gt;other&lt;\/strong&gt;, &lt;strong&gt;stolen&lt;\/strong&gt;, and &lt;strong&gt;suspectedFraud&lt;\/strong&gt;. &lt;code&gt;statusReason&lt;\/code&gt; is required when you change the &lt;code&gt;status&lt;\/code&gt; of the payment instrument to &lt;strong&gt;suspended&lt;\/strong&gt; or &lt;strong&gt;closed&lt;\/strong&gt;.&lt;\/li&gt;\n&lt;li&gt;Added the &lt;code&gt;line1&lt;\/code&gt;, &lt;code&gt;line2&lt;\/code&gt;, and &lt;code&gt;line3&lt;\/code&gt; fields to  the &lt;code&gt;card.authentication.deliveryContact.address&lt;\/code&gt; object. You can use them as replacement for the removed &lt;code&gt;houseNumberOrName&lt;\/code&gt; and &lt;code&gt;street&lt;\/code&gt; fields to specify the address details.&lt;\/li&gt;\n&lt;\/ul&gt;\n&lt;p&gt;&lt;strong&gt;Transaction rules&lt;\/strong&gt;&lt;\/p&gt;\n&lt;ul&gt;\n&lt;li&gt;You can now apply a transaction rule to a balance account, account holder, or an entire balance platform by setting the &lt;code&gt;entityKey.entityType&lt;\/code&gt; to &lt;strong&gt;balanceAccount&lt;\/strong&gt;, &lt;strong&gt;accountHolder&lt;\/strong&gt;, or &lt;strong&gt;balancePlatform&lt;\/strong&gt;. See &lt;a href=\&quot;\/issuing\/authorisation\/transaction-rules\/examples\&quot;&gt;examples of use cases&lt;\/a&gt;.&lt;\/li&gt;\n&lt;li&gt;Added more conditions, such as &lt;code&gt;internationalTransactions&lt;\/code&gt;, &lt;code&gt;differentCurrencies&lt;\/code&gt;, and  &lt;code&gt;timeOfDay&lt;\/code&gt;. See &lt;a href=\&quot;\/issuing\/authorisation\/transaction-rules\/create-and-manage#allowed-combinations\&quot;&gt;list of rule restrictions&lt;\/a&gt;.&lt;\/li&gt;\n&lt;li&gt;You can now specify how &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\#\/balanceplatform\/v2\/post\/transactionRules__resParam_ruleRestrictions\&quot; class=\&quot;codeLabel\&quot;&gt;ruleRestrictions&lt;\/a&gt; must be evaluated in the &lt;code&gt;operation&lt;\/code&gt; field.&lt;\/li&gt;\n&lt;\/ul&gt;&quot;},{&quot;type&quot;:&quot;deprecated&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;p&gt;&lt;strong&gt;Transaction rules&lt;\/strong&gt;&lt;br \/&gt;\nWe deprecated the &lt;strong&gt;allowList&lt;\/strong&gt; as a rule &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\#\/balanceplatform\/v2\/post\/transactionRules__reqParam_type\&quot; class=\&quot;codeLabel\&quot;&gt;type&lt;\/a&gt;. Use the new  &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/balanceplatform\/2\/post\/transactionRules#responses-200-ruleRestrictions\&quot; class=\&quot;codeLabel  external-link no-image\&quot; target=\&quot;_blank\&quot; rel=\&quot;nofollow noopener noreferrer\&quot;&gt;operation&lt;\/a&gt; field to specify how the conditions must be evaluated. For example, if you want to only allow transactions from the US and Canada, set the &lt;code&gt;operation&lt;\/code&gt; to &lt;strong&gt;noneMatch&lt;\/strong&gt;. &lt;\/p&gt;\n&lt;pre&gt;&lt;code class=\&quot;language-json\&quot;&gt;{\n  \&quot;type\&quot;: \&quot;blockList\&quot;,\n  \&quot;ruleRestrictions\&quot;: {\n    \&quot;countries\&quot;: {\n      \&quot;operation\&quot;: \&quot;noneMatch\&quot;,\n      \&quot;value\&quot;: [\&quot;US\&quot;, \&quot;CA\&quot;]\n    }\n  }\n}&lt;\/code&gt;&lt;\/pre&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;balance_platform_configuration_api&quot;,&quot;category&quot;:&quot;balance_platform_configuration_api&quot;},{&quot;id&quot;:&quot;2022-01-17-0h35x&quot;,&quot;title&quot;:&quot;Transfers API&quot;,&quot;release_date&quot;:&quot;2021-10-28&quot;,&quot;date&quot;:1635372000000,&quot;latest&quot;:false,&quot;subtitle&quot;:&quot;&quot;,&quot;summary&quot;:null,&quot;version&quot;:&quot;2&quot;,&quot;rss_url&quot;:&quot;?balance_platform_category=transfers_api&amp;version=2&amp;utm_source=rss_feed#releaseNote=2021-10-28-transfers-api-2&quot;,&quot;imgUrl&quot;:&quot;\/user\/themes\/adyen\/images\/illustrations\/code.svg&quot;,&quot;imgInvertColors&quot;:true,&quot;imgBackgroundColor&quot;:&quot;#20304c&quot;,&quot;product&quot;:{&quot;name&quot;:&quot;issuing&quot;,&quot;type&quot;:&quot;balance_platform_category&quot;,&quot;value&quot;:&quot;transfers_api&quot;},&quot;updates&quot;:[{&quot;type&quot;:&quot;new&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;ul&gt;\n&lt;li&gt;New endpoints:  &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/transfers\/2\/get\/transactions\&quot; class=\&quot;codeLabel  external-link no-image\&quot; target=\&quot;_blank\&quot; rel=\&quot;nofollow noopener noreferrer\&quot;&gt;\/transactions&lt;\/a&gt; and &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\#\/transfers\/v2\/get\/transactions\/{id}\&quot; class=\&quot;codeLabel\&quot;&gt;\/transactions\/{id}&lt;\/a&gt;. These endpoints returns details of transactions.&lt;\/li&gt;\n&lt;li&gt;Added a &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\#\/transfers\/v2\/post\/transfers__reqParam_referenceForBeneficiary\&quot; class=\&quot;codeLabel\&quot;&gt;referenceForBeneficiary&lt;\/a&gt; field, which you can use as a reference for the recipient. &lt;\/li&gt;\n&lt;\/ul&gt;&quot;},{&quot;type&quot;:&quot;breaking_changes&quot;,&quot;ofSection&quot;:&quot;&quot;,&quot;content&quot;:&quot;&lt;ul&gt;\n&lt;li&gt;&lt;code&gt;requestid&lt;\/code&gt; replaces &lt;code&gt;pspReference&lt;\/code&gt; in all response headers.&lt;\/li&gt;\n&lt;li&gt;The  &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\/transfers\/2\/post\/transfers#request-balanceAccountId\&quot; class=\&quot;codeLabel  external-link no-image\&quot; target=\&quot;_blank\&quot; rel=\&quot;nofollow noopener noreferrer\&quot;&gt;balanceAccountId&lt;\/a&gt; and &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\#\/transfers\/v2\/post\/transfers__reqParam_paymentInstrumentId\&quot; class=\&quot;codeLabel\&quot;&gt;paymentInstrumentId&lt;\/a&gt; fields replaces the &lt;code&gt;source&lt;\/code&gt; object. &lt;\/li&gt;\n&lt;li&gt;The &lt;a href=\&quot;https:\/\/docs.adyen.com\/api-explorer\#\/transfers\/v2\/post\/transfers__reqParam_counterparty\&quot; class=\&quot;codeLabel\&quot;&gt;counterparty&lt;\/a&gt; object replaces the &lt;code&gt;destination&lt;\/code&gt; object.&lt;\/li&gt;\n&lt;\/ul&gt;&quot;}],&quot;balance_platform_category&quot;:&quot;transfers_api&quot;,&quot;category&quot;:&quot;transfers_api&quot;}]"
                                    :show-whats-changed="false"
                                >
                                </release-notes>
